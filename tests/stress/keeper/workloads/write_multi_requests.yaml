name: write_multi_requests
# Write with batch multi (create/set in one Multi). Same paths/setup as prod_mix.
concurrency: 640
report_delay: 0.0
continue_on_error: true

connections:
  operation_timeout_ms: 30000
  connection_timeout_ms: 400000

setup:
  node:
    name: e2e
    node:
      name: prod
      node:
      - name: hot
        data:
          random_string:
            size:
              min_value: 0
              max_value: 162
      - name: pool
        node:
        - repeat: 64
          name:
            random_string:
              size: 12
          data:
            random_string:
              size:
                min_value: 0
                max_value: 162
      - name: churn

generator:
  requests:
    create:
      path:
      - /e2e/prod/churn
      - /e2e/prod/pool
      - children_of: /e2e/prod/pool
      name_length:
        min_value: 8
        max_value: 16
      data:
        random_string:
          size:
            min_value: 0
            max_value: 162
      remove_factor: 0.49
      weight: 25
    set:
      path:
      - /e2e/prod/hot
      - children_of: /e2e/prod/pool
      data:
        random_string:
          size:
            min_value: 0
            max_value: 162
      weight: 25
    multi:
      size:
        min_value: 5
        max_value: 15
      create:
        path: /e2e/prod/churn
        data:
          random_string:
            size:
              min_value: 0
              max_value: 162
      set:
        path: /e2e/prod/hot
        data:
          random_string:
            size:
              min_value: 0
              max_value: 162
      weight: 50
