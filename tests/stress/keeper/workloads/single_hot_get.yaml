name: single_hot_get
# 100% get on a single hot path. Stresses cache and single-node read path; same setup as prod_mix.
concurrency: 640
report_delay: 0.0
continue_on_error: true

connections:
  operation_timeout_ms: 30000
  connection_timeout_ms: 400000

setup:
  node:
    name: e2e
    node:
      name: prod
      node:
      - name: hot
        data:
          random_string:
            size:
              min_value: 0
              max_value: 162
      - name: pool
        node:
        - repeat: 64
          name:
            random_string:
              size: 12
          data:
            random_string:
              size:
                min_value: 0
                max_value: 162
      - name: churn

generator:
  requests:
    get:
      path:
      - /e2e/prod/hot
      weight: 100
