name: multi_large_requests
# 100% multi with batch size 10–30 (create + set). Stresses multi transaction path and log batching; same setup as prod_mix.
concurrency: 640
report_delay: 0.0
continue_on_error: true

connections:
  operation_timeout_ms: 30000
  connection_timeout_ms: 400000

setup:
  node:
    name: e2e
    node:
      name: prod
      node:
      - name: hot
        data:
          random_string:
            size:
              min_value: 0
              max_value: 162
      - name: pool
        node:
        - repeat: 64
          name:
            random_string:
              size: 12
          data:
            random_string:
              size:
                min_value: 0
                max_value: 162
      - name: churn

generator:
  requests:
    multi:
      size:
        min_value: 10
        max_value: 30
      create:
        path: /e2e/prod/churn
        data:
          random_string:
            size:
              min_value: 0
              max_value: 162
        remove_factor: 0.3
      set:
        path: /e2e/prod/hot
        data:
          random_string:
            size:
              min_value: 0
              max_value: 162
      weight: 100
