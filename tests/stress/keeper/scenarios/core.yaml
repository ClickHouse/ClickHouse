version: 1
defaults:
  duration: 120
  topology: 3
scenarios:
  - id: CHA-01
    name: Baseline gp3
    topology: 3
    duration: 120
    workload: 
      config: workloads/prod_mix.yaml
    pre:
      - { kind: ensure_paths, on: leader, paths: ["/e2e/prod", "/e2e/prod/create", "/e2e/prod/set"] }
    faults:
      - { kind: netem, on: all, delay_ms: 10, jitter_ms: 5, loss_pct: 0, duration_s: 120, target_parallel: true }
      - { kind: dm_delay, on: all, ms: 3, duration_s: 120, target_parallel: true }
    gates:
      - { type: single_leader }
      - { type: error_rate_le }
      - { type: p99_le }
      - { type: log_sanity_ok }
      - { type: print_summary }
      - { type: mntr_print }
      - { type: count_paths, prefixes: ["/e2e/prod", "/e2e/prod/create", "/e2e/prod/set"] }

  - id: CHA-01-REPLAY
    name: Baseline gp3
    topology: 3
    duration: 120
    workload: 
      config: workloads/prod_mix.yaml
      replay: tests/stress/keeper/workloads/zookeeper_log.parquet
    pre:
      - { kind: ensure_paths, on: leader, paths: ["/e2e/prod", "/e2e/prod/create", "/e2e/prod/set"] }
    faults:
      - { kind: netem, on: all, delay_ms: 10, jitter_ms: 5, loss_pct: 0, duration_s: 120, target_parallel: true }
      - { kind: dm_delay, on: all, ms: 3, duration_s: 120, target_parallel: true }
    gates:
      - { type: single_leader }
      # Replay: bootstrap + version tracking; errors = unexpected results only
      - { type: error_rate_le, max_ratio: 0.05 }
      # Replay latency can be higher under load (bootstrap CREATEs + full log); allow p99 up to 20s
      - { type: p99_le, max_ms: 20000 }
      - { type: log_sanity_ok }
      - { type: print_summary }
      - { type: mntr_print }
      # Replay uses sanitized paths (not /e2e/prod); count_paths may be 0, skip strict check
      - { type: count_paths, prefixes: ["/e2e/prod", "/e2e/prod/create", "/e2e/prod/set"] }

  - id: RCFG-06
    name: Reconfig while minority refused
    topology: 3
    duration: 120
    workload: { config: workloads/prod_mix.yaml }
    faults:
      - kind: partition_symmetric_during
        on: leader
        steps:
          - { kind: reconfig, on: leader, operation: remove, server_id: 3, ok: false }
    gates:
      - { type: single_leader }
      - { type: config_converged, timeout_s: 60 }
      - { type: log_sanity_ok }
