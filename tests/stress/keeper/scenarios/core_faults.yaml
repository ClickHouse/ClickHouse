# ─── CPU pressure ─────────────────────────────────────────────────────────────
# cpu_hog spins a shell busy-loop for the fault duration — no restart, quorum
# is always maintained.  Targeting the leader stresses the Raft commit path;
# targeting all nodes stresses quorum-wide log application.
- id: prod-mix-cpu-leader-fault
  name: 'Prod mix [fault: cpu_hog leader]'
  description: Prod mix with CPU saturation on the leader. Leader processes all Raft writes; starvation raises commit latency. Compare with prod-mix-no-fault.
  topology: 3
  duration: 120
  workload:
    config: workloads/prod_mix.yaml
  pre:
  - kind: ensure_paths
    'on': leader
    paths:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
  faults:
  - kind: cpu_hog
    'on': leader
    seconds: 120
  gates:
  - type: single_leader
  - type: error_rate_le
  - type: p99_le
  - type: log_sanity_ok
  - type: print_summary
- id: write-multi-cpu-all-fault
  name: 'MultiWrite [fault: cpu_hog all]'
  description: Batched writes with CPU saturation on all nodes. Every node must process Raft log entries; all-node starvation stresses quorum throughput. Compare with write-multi-no-fault.
  topology: 3
  duration: 120
  workload:
    config: workloads/write_multi_requests.yaml
  pre:
  - kind: ensure_paths
    'on': leader
    paths:
    - /e2e/write-multi
  faults:
  - kind: cpu_hog
    'on': all
    seconds: 120
    target_parallel: true
  gates:
  - type: single_leader
  - type: error_rate_le
  - type: log_sanity_ok
  - type: print_summary

# ─── Memory pressure ──────────────────────────────────────────────────────────
# mem_hog allocates a fixed byte array in Python for the fault duration — no
# restart, quorum is always maintained.  Large-payload workload is most
# sensitive since each znode requires memory to buffer and serialize.
- id: large-payload-mem-fault
  name: 'Large payload [fault: mem_hog all]'
  description: Large znode writes (32 KB) with 512 MB memory pressure on all nodes. Stresses serialization and network buffers. Compare with large-payload-no-fault.
  topology: 3
  duration: 120
  workload:
    config: workloads/large_payload.yaml
  pre:
  - kind: ensure_paths
    'on': leader
    paths:
    - /e2e/large
  faults:
  - kind: mem_hog
    'on': all
    mb: 512
    seconds: 120
    target_parallel: true
  gates:
  - type: single_leader
  - type: error_rate_le
  - type: log_sanity_ok
  - type: print_summary
- id: prod-mix-mem-fault
  name: 'Prod mix [fault: mem_hog all]'
  description: Prod mix with 256 MB memory pressure on all nodes. Tests graceful degradation under general memory contention. Compare with prod-mix-no-fault.
  topology: 3
  duration: 120
  workload:
    config: workloads/prod_mix.yaml
  pre:
  - kind: ensure_paths
    'on': leader
    paths:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
  faults:
  - kind: mem_hog
    'on': all
    mb: 256
    seconds: 120
    target_parallel: true
  gates:
  - type: single_leader
  - type: error_rate_le
  - type: log_sanity_ok
  - type: print_summary

# ─── Disk latency ─────────────────────────────────────────────────────────────
# dm_delay redirects the coordination directory onto a devicemapper delay table.
# IMPORTANT: setup and teardown each require a SIGKILL + restart of the target
# node (~60-120 s each), so the total disruption window is 120-240 s.  A 300 s
# scenario duration leaves ~60-180 s with the fault genuinely active.
# Bench errors during the restart windows are expected; max_ratio is relaxed.
# Target: leader only to preserve quorum throughout.
- id: write-disk-latency-fault
  name: 'Write [fault: dm_delay leader]'
  description: Write workload with 3 ms disk I/O delay on the leader via devicemapper. Every committed write requires an fsync on the coordination log; this directly taxes the disk path. Expect errors during the ~120-240 s restart windows. Compare with write-no-fault.
  topology: 3
  duration: 300
  workload:
    config: workloads/write_requests.yaml
  pre:
  - kind: ensure_paths
    'on': leader
    paths:
    - /e2e/write
  faults:
  - kind: dm_delay
    'on': leader
    ms: 3
    duration_s: 300
  gates:
  - type: single_leader
  - type: error_rate_le
    max_ratio: 0.4
  - type: log_sanity_ok
  - type: print_summary
