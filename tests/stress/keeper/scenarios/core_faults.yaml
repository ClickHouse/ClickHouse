version: 1
defaults:
  duration: 120
  topology: 3
scenarios:
- id: baseline-prod-mix
  name: Baseline — prod mix with light latency (netem + dm_delay)
  description: Main regression test. Full request mix (get, create, set, multi, list) with small network and disk delay. Run after baseline-prod-mix-no-faults to check behavior under faults.
  topology: 3
  duration: 120
  workload:
    config: workloads/prod_mix.yaml
  pre:
  - kind: ensure_paths
    'on': leader
    paths:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
  faults:
  - kind: netem
    'on': all
    delay_ms: 10
    jitter_ms: 5
    loss_pct: 0
    duration_s: 120
    target_parallel: true
  - kind: dm_delay
    'on': all
    ms: 3
    duration_s: 120
    target_parallel: true
  gates:
  - type: single_leader
  - type: error_rate_le
  - type: p99_le
  - type: log_sanity_ok
  - type: print_summary
  - type: mntr_print
  - type: count_paths
    prefixes:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
- id: baseline-replay
  name: Replay — with light latency (netem + dm_delay)
  description: Same conditions as default regression but workload is replayed from a parquet file (recorded earlier). Checks replay path under faults.
  topology: 3
  duration: 120
  workload:
    config: workloads/prod_mix.yaml
    replay: tests/stress/keeper/workloads/zookeeper_log_extended.parquet
  pre:
  - kind: ensure_paths
    'on': leader
    paths:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
  faults:
  - kind: netem
    'on': all
    delay_ms: 10
    jitter_ms: 5
    loss_pct: 0
    duration_s: 120
    target_parallel: true
  - kind: dm_delay
    'on': all
    ms: 3
    duration_s: 120
    target_parallel: true
  gates:
  - type: single_leader
  - type: error_rate_le
    max_ratio: 0.5
  - type: p99_le
    max_ms: 200000
  - type: log_sanity_ok
  - type: print_summary
  - type: mntr_print
  - type: count_paths
    prefixes:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
