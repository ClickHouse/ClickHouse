  - type: log_sanity_ok
  - type: print_summary
- id: latency-wan-client-fault
  name: 'Latency — WAN client path [fault: netem]'
  description: Leader 50ms, followers clean. Client-to-leader link is WAN; Raft inter-node traffic unaffected. Compare with prod-mix-no-fault.
  topology: 3
