version: 1
defaults:
  duration: 120
  topology: 3
scenarios:
# ─── Light latency (netem + dm_delay) — pair with core_no_faults ───────────
- id: prod-mix-light
  name: Prod mix (light latency)
  description: Full request mix with netem 10ms + dm_delay 3ms. Pair with prod-mix-no-fault.
  topology: 3
  duration: 120
  workload:
    config: workloads/prod_mix.yaml
  pre:
  - kind: ensure_paths
    'on': leader
    paths:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
  faults:
  - kind: netem
    'on': all
    delay_ms: 10
    jitter_ms: 5
    loss_pct: 0
    duration_s: 120
    target_parallel: true
  - kind: dm_delay
    'on': all
    ms: 3
    duration_s: 120
    target_parallel: true
  gates:
  - type: single_leader
  - type: error_rate_le
  - type: p99_le
  - type: log_sanity_ok
  - type: print_summary
  - type: mntr_print
  - type: count_paths
    prefixes:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
