- id: latency-multi-region
  name: Latency — multi-region (followers far away)
  description: Leader has low latency; followers have high latency. Simulates one datacenter region far from the others.
  topology: 3
  duration: 120
  workload:
    config: workloads/prod_mix.yaml
  pre:
  - kind: ensure_paths
    'on': leader
    paths:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
  faults:
  - kind: netem
    'on': leader
    delay_ms: 10
    jitter_ms: 5
    loss_pct: 0
    duration_s: 120
    target_parallel: true
  - kind: netem
    'on': followers
    delay_ms: 80
    jitter_ms: 20
    loss_pct: 0
    duration_s: 120
    target_parallel: true
  - kind: dm_delay
