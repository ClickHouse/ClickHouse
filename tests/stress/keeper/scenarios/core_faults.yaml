  - type: print_summary
- id: latency-single-follower-fault
  name: 'Latency — single follower [fault: netem]'
  description: One follower 80ms, leader and other follower stay clean. Quorum maintained. Models one node in a distant DC. Compare with prod-mix-no-fault.
  topology: 3
  duration: 120
  workload:
