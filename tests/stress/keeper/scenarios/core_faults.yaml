version: 1
defaults:
  duration: 120
  topology: 3
scenarios:
# ─── Network latency — workload coverage (pair 1:1 with core_no_faults) ──────
# All 10 scenarios apply netem 10ms + 5ms jitter to every node.  netem is
# applied without restarting nodes so quorum is never lost and bench metrics
# are fully verifiable.  FaultRunner fires ~4 × 30s rounds of netem across the
# 120s window.  Compare each scenario against its paired no-fault baseline.
- id: prod-mix-fault
  name: 'Prod mix [fault: netem]'
  description: Full request mix with netem 10ms + 5ms jitter on all nodes. Pair with prod-mix-no-fault.
  topology: 3
  duration: 120
  workload:
    config: workloads/prod_mix.yaml
  pre:
  - kind: ensure_paths
    'on': leader
    paths:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
  faults:
  - kind: netem
    'on': all
    delay_ms: 10
    jitter_ms: 5
    loss_pct: 0
    duration_s: 120
    target_parallel: true
  gates:
  - type: single_leader
  - type: error_rate_le
  - type: p99_le
  - type: log_sanity_ok
  - type: print_summary
  - type: mntr_print
  - type: count_paths
    prefixes:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
