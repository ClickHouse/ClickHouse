# ─── Latency stress (specialized fault profiles) — compare with prod-mix-no-fault ─
- id: latency-multi-region
  name: Latency — multi-region
  description: Leader 10ms, followers 80ms (geo-distributed). Compare with prod-mix-no-fault.
  topology: 3
  duration: 120
  workload:
    config: workloads/prod_mix.yaml
  pre:
  - kind: ensure_paths
    'on': leader
    paths:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
  faults:
  - kind: netem
    'on': leader
    delay_ms: 10
    jitter_ms: 5
    loss_pct: 0
    duration_s: 120
    target_parallel: true
  - kind: netem
    'on': followers
    delay_ms: 80
    jitter_ms: 20
    loss_pct: 0
    duration_s: 120
    target_parallel: true
  - kind: dm_delay
    'on': all
    ms: 3
    duration_s: 120
    target_parallel: true
  gates:
  - type: single_leader
  - type: error_rate_le
    max_ratio: 0.05
  - type: p99_le
    max_ms: 5000
  - type: log_sanity_ok
  - type: print_summary
