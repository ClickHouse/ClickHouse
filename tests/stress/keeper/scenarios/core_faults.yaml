# ─── Specialized network conditions (compare with prod-mix-no-fault) ──────────
# These six scenarios vary the fault topology rather than the workload.
# All use prod_mix workload so Grafana comparisons against prod-mix-no-fault
# are apples-to-apples.  Each tests a distinct real-world fault shape:
#
# latency-multi-region-fault: uses kind: parallel so leader (10ms) and
#   followers (80ms) netem are active simultaneously — not alternating rounds.
#   This is the only way to model asymmetric geo-distributed latency correctly.
#
# latency-wan-fault: packet loss (2%) combined with jitter.  No p99 gate
#   because TCP retransmits make tail latency unbounded under loss.
#
# latency-jitter-fault: high jitter (15ms) tests Raft timeout stability.
#   180s gives FaultRunner more rounds to stress the timing variance.
#
# latency-slow-follower-fault: netem on ALL followers, leader stays fast.
#   Followers' egress is delayed so Raft AppendEntries acks arrive at the
#   leader 80ms late.  Leader must wait for quorum before committing writes,
#   so write p99 rises while reads from the leader are unaffected.
#   Distinct from multi-region: the leader-to-client path is clean here.
#
# latency-single-follower-fault: netem on ONE follower (first_follower) only.
#   The other follower stays clean.  Models a single node in a distant DC while
#   the rest of the cluster is local.  Quorum (leader + one fast follower) is
#   maintained throughout, so this is the most targeted and verifiable disk/net
#   fault shape: one node degrades, cluster continues, bench measures the effect.
#   Compare with latency-slow-follower-fault which affects all followers.
#
# latency-wan-client-fault: netem on leader only (50ms).  The client ↔ leader
#   link is the WAN path; inter-node Raft traffic between leader and followers
#   is completely unaffected.  Tests how client-perceived latency rises when the
#   leader is geographically distant from the client, while Raft replication
#   remains local and fast.  Compare with latency-slow-follower-fault (where
#   Raft acks are slow but the client path is fast).
- id: latency-multi-region-fault
  name: 'Latency — multi-region [fault: netem]'
  description: Leader 10ms, followers 80ms simultaneously. Models geo-distributed deployment. Compare with prod-mix-no-fault.
  topology: 3
  duration: 120
  workload:
    config: workloads/prod_mix.yaml
  pre:
  - kind: ensure_paths
    'on': leader
    paths:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
  faults:
  - kind: parallel
    steps:
    - kind: netem
      'on': leader
      delay_ms: 10
      jitter_ms: 5
      target_parallel: true
    - kind: netem
      'on': followers
      delay_ms: 80
      jitter_ms: 20
      target_parallel: true
  gates:
  - type: single_leader
  - type: error_rate_le
    max_ratio: 0.05
  - type: log_sanity_ok
  - type: print_summary
- id: latency-wan-fault
  name: 'Latency — WAN [fault: netem]'
  description: 25ms delay, 7ms jitter, 2% packet loss on all nodes. Compare with prod-mix-no-fault.
  topology: 3
  duration: 120
  workload:
    config: workloads/prod_mix.yaml
  pre:
  - kind: ensure_paths
    'on': leader
