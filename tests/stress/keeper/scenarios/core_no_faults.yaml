version: 1
defaults:
  duration: 120
  topology: 3
scenarios:
- id: baseline-prod-mix-no-faults
  name: Baseline — prod mix, no fault injection
  description: Same workload as baseline-prod-mix but no network/disk delay. Clean run for baseline throughput and latency.
  topology: 3
  duration: 120
  workload:
    config: workloads/prod_mix.yaml
  pre:
  - kind: ensure_paths
    'on': leader
    paths:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
  faults: []
  gates:
  - type: single_leader
  - type: error_rate_le
  - type: p99_le
  - type: log_sanity_ok
  - type: print_summary
  - type: mntr_print
  - type: count_paths
    prefixes:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
- id: baseline-replay-no-faults
  name: Replay — no fault injection
  description: Same as baseline-replay but no faults. Compare with baseline-replay for replay path performance under stress.
  topology: 3
  duration: 120
  workload:
    config: workloads/prod_mix.yaml
    replay: tests/stress/keeper/workloads/zookeeper_log_extended.parquet
  pre:
  - kind: ensure_paths
    'on': leader
    paths:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
  faults: []
  gates:
  - type: single_leader
  - type: error_rate_le
    max_ratio: 0.5
  - type: p99_le
    max_ms: 200000
  - type: log_sanity_ok
  - type: print_summary
  - type: mntr_print
  - type: count_paths
    prefixes:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
