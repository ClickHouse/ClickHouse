version: 1
defaults:
  duration: 120
  topology: 3
scenarios:
# ─── Baselines ─────────────────────────────────────────────────────────────
- id: prod-mix
  name: Prod mix (no faults)
  description: Full request mix (get, create, set, multi, list). Baseline for prod-mix-light.
  topology: 3
  duration: 120
  workload:
    config: workloads/prod_mix.yaml
  pre:
  - kind: ensure_paths
    'on': leader
    paths:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
  faults: []
  gates:
  - type: single_leader
  - type: error_rate_le
  - type: p99_le
  - type: log_sanity_ok
  - type: print_summary
  - type: mntr_print
  - type: count_paths
    prefixes:
    - /e2e/prod
    - /e2e/prod/create
    - /e2e/prod/set
