/// Map a single token to a CSS class. For BareWords we also peek at the next
/// non-whitespace token to distinguish a function call (`foo(`) from a plain
/// identifier — the lexer alone cannot tell them apart.
function tokenClass(tokens, i) {
    const elem = tokens[i];
    switch (elem.type) {
        case TT.Comment: return 'q-com';
        case TT.Number: return 'q-num';
        case TT.StringLiteral:
        case TT.HereDoc: return 'q-str';
        case TT.QuotedIdentifier: return 'q-qid';
        case TT.BareWord: {
            if (SQL_KEYWORDS.has(elem.token.toUpperCase())) return 'q-kw';
            for (let j = i + 1; j < tokens.length; ++j) {
                if (tokens[j].type === TT.Whitespace) continue;
                return tokens[j].type === TT.OpeningRoundBracket ? 'q-fn' : 'q-id';
            }
            return 'q-id';
        }
        case TT.Asterisk: case TT.Plus: case TT.Minus: case TT.Slash: case TT.Percent:
        case TT.Arrow: case TT.QuestionMark: case TT.Colon: case TT.DoubleColon: case TT.Caret:
        case TT.Equals: case TT.NotEquals:
        case TT.Less: case TT.Greater: case TT.LessOrEquals: case TT.GreaterOrEquals:
        case TT.Spaceship: case TT.PipeMark: case TT.Concatenation:
        case TT.At: case TT.DoubleAt: case TT.DollarSign:
            return 'q-op';
        default:
            return '';
    }
}

/// Cached state for cursor-tracking re-renders that do not re-tokenize.
let currentTokens = [];
let currentBoundaries = [];
let currentBackdropText = '';
/// Guard so that the backdrop re-renders triggered by the completion code (to update the
/// reserved spacer) do not recurse back into `updateCompletions`.
let inRenderBackdrop = false;

function updateQueryBackdrop(text, tokens, boundaries) {
    currentTokens = tokens || [];
    currentBoundaries = boundaries || [];
    currentBackdropText = text || '';
    renderQueryBackdrop();
}

function renderQueryBackdrop() {
    const text = currentBackdropText;
    const tokens = currentTokens;
    const boundaries = currentBoundaries;

    /// Update button labels to reflect current selection state.
    updateRunButtons(boundaries.length > 1);

    /// No content, or the WASM lexer is not available — fall back to the unstyled textarea.
    if (!text || tokens.length === 0) {
        queryBackdrop.style.display = 'none';
        query_area.classList.remove('has-backdrop');
        if (!inRenderBackdrop) updateCompletions();
        return;
    }

    /// When the completion list is open, reserve blank space at the cursor for the selected
    /// candidate's suffix, so the text to the right shifts as if it had been typed.
    const spacerText = completionCandidates.length
        ? completionCandidates[completionSelected].substring(completionPrefix.length)
        : null;
    const spacerOffset = completionPrefixStart + completionPrefix.length;

    const cursor = query_area.selectionStart;
    const focused = document.activeElement === query_area;

    /// Find which query contains the cursor (only when textarea is focused and we are
    /// actually in multi-query mode).
    let activeStart = -1;
    let activeEnd = -1;
    if (focused && boundaries.length > 1) {
        for (let i = 0; i < boundaries.length; ++i) {
            if (cursor >= boundaries[i].start && cursor <= boundaries[i].end) {
                activeStart = boundaries[i].start;
                activeEnd = boundaries[i].end;
                break;
            }
        }
    }

    let html = '';
    let offset = 0;
    let activeOpen = false;

    for (let i = 0; i < tokens.length; ++i) {
        const elem = tokens[i];
        const tokStart = offset;
        const tokEnd = offset + elem.token.length;
        offset = tokEnd;

        const inActive = activeStart >= 0 && tokEnd > activeStart && tokStart < activeEnd;
        if (inActive && !activeOpen) {
            html += '<span class="q-active">';
            activeOpen = true;
        } else if (!inActive && activeOpen) {
            html += '</span>';
            activeOpen = false;
        }

        const cls = tokenClass(tokens, i);
        const escaped = escapeHTML(elem.token);
        if (cls) {
            html += '<span class="' + cls + '">' + escaped + '</span>';
        } else {
            html += escaped;
        }

        /// The cursor sits at the end of the prefix identifier (a token boundary); insert the
        /// reserved spacer right there.
        if (spacerText !== null && offset === spacerOffset) {
            html += '<span class="completion-spacer">' + escapeHTML(spacerText) + '</span>';
        }
    }
    if (activeOpen) {
        html += '</span>';
    }

    /// Any tail not covered by tokens (lexer hit an error or reached the size limit)
    /// is shown with the error style.
    if (offset < text.length) {
        html += '<span class="q-err">' + escapeHTML(text.substring(offset)) + '</span>';
    }

    /// Trailing newline fix: browsers collapse a trailing \n in a div.
    if (html.endsWith('\n')) html += ' ';

    queryBackdrop.innerHTML = html;
    queryBackdrop.style.display = 'block';
    query_area.classList.add('has-backdrop');

    /// Match the scrollbar: reserve extra right padding so text wraps identically.
    /// clientWidth excludes borders and scrollbar; offsetWidth includes borders.
    /// The border is 1px on each side, so scrollbar = offsetWidth - clientWidth - 2.
    const scrollbarWidth = query_area.offsetWidth - query_area.clientWidth - 2;
    queryBackdrop.style.paddingRight = scrollbarWidth > 0 ? 'calc(0.25rem + ' + scrollbarWidth + 'px)' : '';

    queryBackdrop.scrollTop = query_area.scrollTop;
    queryBackdrop.scrollLeft = query_area.scrollLeft;

    /// Keep autocompletion in sync with the freshly rendered text/cursor (unless this render
    /// was itself triggered by the completion code, which would recurse).
    if (!inRenderBackdrop) updateCompletions();
}

/// Re-render backdrop when cursor moves or selection changes.
query_area.addEventListener('click', renderQueryBackdrop);
query_area.addEventListener('keyup', renderQueryBackdrop);
query_area.addEventListener('select', renderQueryBackdrop);
query_area.addEventListener('focus', renderQueryBackdrop);
query_area.addEventListener('blur', renderQueryBackdrop);
/// Hide autocompletion when the textarea loses focus.
query_area.addEventListener('blur', closeCompletions);

/// Keep backdrop scroll in sync with textarea.
query_area.addEventListener('scroll', () => {
    queryBackdrop.scrollTop = query_area.scrollTop;
    queryBackdrop.scrollLeft = query_area.scrollLeft;
    /// Reposition the completion overlay to follow the scrolled caret.
    renderCompletionOverlay();
});

/// ----------------------------------------------------------------------------
/// Autocompletion.
///
/// Completions are loaded lazily from `system.completions` the first time the user
/// focuses the textarea (mirroring how `clickhouse-client` loads its suggestions).
/// The feature only activates when the WASM lexer is available, because we reuse the
/// token stream to find the identifier under the cursor and the backdrop/mirror
/// machinery to position the ghost text.
/// ----------------------------------------------------------------------------

/// The visible window around the selected candidate: up to this many above and below (so up to
/// 1 + 4 + 4 entries are shown at once). The rest are reachable by navigating; a "…" marks more.
const MAX_COMPLETIONS_ABOVE = 4;
const MAX_COMPLETIONS_BELOW = 4;
const MAX_COMPLETION_CANDIDATES = 100; /// Upper bound on the full candidate list we keep.
const MIN_COMPLETION_PREFIX = 1;

const completionMirror = document.getElementById('completion-mirror');
const completionOverlay = document.getElementById('completion-overlay');

/// Sorted (by lowercased word) array of { w, lw } for prefix lookup.
let completionWords = [];
let completionsLoadStarted = false;
/// Bumped whenever the connection settings change, to invalidate a cached or in-flight load.
/// `system.completions` is filtered by the connected user's privileges, so suggestions must not
/// outlive the connection they were loaded for.
let completionsLoadGeneration = 0;
/// How many times each completion was accepted in this session — accepted completions
/// bubble to the top of the candidate list on subsequent uses.
let completionUsage = new Map();

/// Currently displayed candidates and which one is selected.
let completionCandidates = [];
let completionSelected = 0;
let completionPrefix = '';
let completionPrefixStart = -1;
/// When the user dismisses with Esc, suppress re-opening for the exact same caret state.
let completionSuppressedKey = null;
/// Set when the user types a word character; gates *opening* the completion list so that
/// clicks, focus, and cursor navigation do not pop it up on their own.
let completionOpenRequested = false;
/// True while `acceptCompletion` is inserting text, so the resulting `input` event is not
/// mistaken for the user typing a new word (which would reopen the list on the accepted word).
let completionAccepting = false;

function wasmAvailable() {
    return typeof WebAssembly === 'object' && typeof WebAssembly.instantiate === 'function';
}

/// Build the request URL the same way `postImpl` does, but for the completion query.
function buildCompletionUrl() {
    const user = user_elem.value;
    const password = password_elem.value;
    const server_address = url_elem.value;
    let url = server_address + (server_address.indexOf('?') >= 0 ? '&' : '?') + 'add_http_cors_header=1';
    if (user) url += '&user=' + encodeURIComponent(user);
    if (password) url += '&password=' + encodeURIComponent(password);
    url += '&default_format=TSVRaw';
    return url;
}

/// The completion query mirrors `getLoadSuggestionQueryUsingSystemCompletionsTable` in
/// `src/Client/Suggest.cpp`: static contexts are loaded in full, while the catalog-sized
/// contexts (database/table/column/dictionary) are capped per context so that focusing the
/// editor does not enumerate and transfer the whole catalog on large installations. Then it
/// extracts identifier-like words from the resulting completion entries.
const COMPLETION_SUGGESTION_LIMIT = 10000;
const COMPLETION_QUERY =
    "SELECT DISTINCT arrayJoin(extractAll(word, '[\\\\w]{2,}')) AS res FROM (" +
        "SELECT word FROM system.completions WHERE context IN " +
        "('function', 'table engine', 'format', 'table function', 'data type', 'merge tree setting', " +
        "'setting', 'aggregate function combinator pair', 'keyword', 'cluster', 'macro', 'policy') " +
        "UNION ALL SELECT word FROM (" +
            "SELECT word, ROW_NUMBER() OVER (PARTITION BY context ORDER BY word) AS rn FROM " +
            "(SELECT DISTINCT word, context FROM system.completions WHERE context IN " +
            "('database', 'table', 'column', 'dictionary'))" +
        ") WHERE rn <= " + COMPLETION_SUGGESTION_LIMIT +
    ") WHERE notEmpty(res)";

async function loadCompletions() {
    if (completionsLoadStarted || !wasmAvailable()) {
        return;
    }
    completionsLoadStarted = true;
    const generation = completionsLoadGeneration;

    try {
        const response = await fetch(buildCompletionUrl(), {
            method: "POST",
            body: COMPLETION_QUERY,
            headers: { 'Authorization': 'never' },
        });
        /// The connection settings changed while loading — discard this stale result.
        if (generation !== completionsLoadGeneration) {
            return;
        }
        if (!response.ok) {
            /// Older servers without `system.completions`, or no connection — the feature
            /// simply stays inactive. This is an optional enhancement, not a fallback that
            /// hides an error from a primary operation. Allow a retry on a later focus (e.g.
            /// once the user has filled in the connection details).
            completionsLoadStarted = false;
            return;
        }
        const text = await response.text();
        if (generation !== completionsLoadGeneration) {
            return;
        }
        const seen = new Set();
        const words = [];
        for (const line of text.split('\n')) {
            const w = line.trim();
            if (w && !seen.has(w)) {
                seen.add(w);
                words.push({ w, lw: w.toLowerCase() });
            }
        }
        words.sort((a, b) => (a.lw < b.lw ? -1 : a.lw > b.lw ? 1 : 0));
        completionWords = words;

        /// The user may have already typed something — show completions right away.
        updateCompletions();
    } catch (e) {
        /// Network error or aborted — allow a retry on a later focus.
        if (generation === completionsLoadGeneration) {
            completionsLoadStarted = false;
        }
        console.error('Failed to load completions:', e);
    }
}

/// Invalidate the cached completions when the connection settings change, so suggestions are
/// reloaded (with the new privileges) on the next focus and any in-flight load is discarded.
function resetCompletions() {
    completionsLoadGeneration++;
    completionsLoadStarted = false;
    completionWords = [];
    closeCompletions();
}

[url_elem, user_elem, password_elem].forEach(el => el.addEventListener('input', resetCompletions));

/// Lower-bound binary search for the first word whose lowercased form is >= `key`.
function completionLowerBound(key) {
    let lo = 0;
    let hi = completionWords.length;
    while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (completionWords[mid].lw < key) lo = mid + 1;
        else hi = mid;
    }
    return lo;
}

/// Find the bare-word identifier that ends exactly at the cursor (so the cursor is at the
/// end of the identifier), using the cached lexer tokens. Returns { prefix, start } or null.
function getIdentifierBeforeCursor() {
    /// Only valid when the cached tokens describe the current textarea contents.
    if (currentBackdropText !== query_area.value) {
        return null;
    }
    const cursor = query_area.selectionStart;
    let offset = 0;
    for (let i = 0; i < currentTokens.length; ++i) {
        const elem = currentTokens[i];
        const start = offset;
        const end = offset + elem.token.length;
        offset = end;
        if (elem.type === TT.BareWord && end === cursor && start < cursor) {
            return { prefix: elem.token, start };
        }
    }
    return null;
}

/// Collect the identifier-like words already present in the query (aliases, column/table names,
/// etc.), excluding the identifier currently being typed at `excludeStart`. These are both a
/// priority signal and a source of candidates, so a word introduced in the query can be
/// completed even if it is not in `system.completions`. Returns unique words in original case.
function queryIdentifierWords(excludeStart) {
    const words = [];
    const seen = new Set();
    let offset = 0;
    for (const elem of currentTokens) {
        const start = offset;
        offset += elem.token.length;
        if (elem.type !== TT.BareWord) continue;
        if (start === excludeStart) continue; /// The identifier being typed is not a suggestion.
        if (elem.token.length < 2) continue;  /// Match the `{2,}` convention used for completions.
        if (seen.has(elem.token)) continue;
        seen.add(elem.token);
        words.push(elem.token);
    }
    return words;
}

/// Compute the candidate list for the given prefix (up to MAX_COMPLETION_CANDIDATES), applying priorities:
///   1. an exact match (a word equal to what was typed) — shown as an empty completion, always first
///   2. previously accepted completions (usage count, desc)
///   3. identifier-like words already present in the query
///   4. case-exact prefix match (so the ghost text continues the typed casing)
///   5. shorter words first, then alphabetical
function findCandidates(prefix, prefixStart) {
    const lprefix = prefix.toLowerCase();
    const queryWords = queryIdentifierWords(prefixStart);
    const present = new Set(queryWords.map(w => w.toLowerCase()));
    const matches = [];
    for (let i = completionLowerBound(lprefix); i < completionWords.length; ++i) {
        const entry = completionWords[i];
        if (!entry.lw.startsWith(lprefix)) break;
        /// A word equal to the prefix is kept as an "empty completion" (its suffix is empty),
        /// rather than skipped, so the user sees their typed word is a recognized one.
        matches.push(entry.w);
    }

    /// Also offer identifier-like words from the query itself (deduplicated by suffix below).
    for (const w of queryWords) {
        if (w.toLowerCase().startsWith(lprefix)) {
            matches.push(w);
        }
    }

    /// Do not open a popup that would only offer the already-typed word (an empty completion
    /// on its own has nothing to show and would needlessly capture Tab/Enter). The empty
    /// completion is shown only alongside at least one real extension.
    if (!matches.some(w => w.length > prefix.length)) {
        return [];
    }

    const score = (w) => ({
        exact: w.length === prefix.length ? 1 : 0,
        usage: completionUsage.get(w) || 0,
        present: present.has(w.toLowerCase()) ? 1 : 0,
        caseExact: w.startsWith(prefix) ? 1 : 0,
    });

    matches.sort((a, b) => {
        const sa = score(a);
        const sb = score(b);
        if (sa.exact !== sb.exact) return sb.exact - sa.exact;
        if (sa.usage !== sb.usage) return sb.usage - sa.usage;
        if (sa.present !== sb.present) return sb.present - sa.present;
        if (sa.caseExact !== sb.caseExact) return sb.caseExact - sa.caseExact;
        if (a.length !== b.length) return a.length - b.length;
        return a < b ? -1 : a > b ? 1 : 0;
    });

    /// Deduplicate by the displayed suffix so that, e.g., case variants of the exact match
    /// (`array`/`ARRAY`/`Array`, all an empty completion) collapse into a single entry and do
    /// not crowd out the real extensions.
    const result = [];
    const seenSuffix = new Set();
    for (const w of matches) {
        const suffix = w.substring(prefix.length);
        if (seenSuffix.has(suffix)) continue;
        seenSuffix.add(suffix);
        result.push(w);
        if (result.length >= MAX_COMPLETION_CANDIDATES) break;
    }
    return result;
}

/// Pixel coordinates (relative to the overlay's padding box) of the caret at `pos`.
function getCaretCoordinates(pos) {
    const text = query_area.value;
    completionMirror.textContent = text.substring(0, pos);
    const marker = document.createElement('span');
    marker.textContent = '​';
    completionMirror.appendChild(marker);
    completionMirror.appendChild(document.createTextNode(text.substring(pos)));

    /// Match the scrollbar reservation the backdrop uses, so wrapping is identical.
    const scrollbarWidth = query_area.offsetWidth - query_area.clientWidth - 2;
    completionMirror.style.paddingRight = scrollbarWidth > 0 ? 'calc(0.25rem + ' + scrollbarWidth + 'px)' : '';

    const top = marker.offsetTop;
    const left = marker.offsetLeft;
    const height = marker.offsetHeight;
    return { top, left, height };
}

/// Recompute whether completions should be shown and update the overlay.
///
/// Completions only *open* right after the user types a word character (tracked by
/// `completionOpenRequested`). Cursor-only events — clicks, focus, arrow navigation — may
/// reposition or close an already-open list, but never open a new one.
function updateCompletions() {
    /// Completions are not loaded yet (the lazy `system.completions` load may still be in
    /// flight). Keep any pending "just typed a word" request so it can fire once
    /// `loadCompletions` finishes and calls back here — otherwise the first word typed during
    /// the initial load would get no suggestions.
    if (!completionWords.length) {
        return;
    }
    if (document.activeElement !== query_area
        || query_area.selectionStart !== query_area.selectionEnd) {
        completionOpenRequested = false;
        closeCompletions();
        return;
    }

    /// The cached tokens do not yet describe the current text (tokenization is still in
    /// flight after an edit). Leave any pending open request intact so the follow-up call,
    /// made once tokens are fresh, can act on it.
    if (currentBackdropText !== query_area.value) {
        return;
    }

    /// Consume the "just typed a word character" request now that we have fresh tokens.
    const allowOpen = completionOpenRequested;
    completionOpenRequested = false;

    const id = getIdentifierBeforeCursor();
    if (!id || id.prefix.length < MIN_COMPLETION_PREFIX) {
        closeCompletions();
        return;
    }

    /// Respect an Esc dismissal for this exact caret state.
    const key = id.start + ':' + id.prefix;
    if (completionSuppressedKey === key) {
        closeCompletions();
        return;
    }
    completionSuppressedKey = null;

    const candidates = findCandidates(id.prefix, id.start);
    if (!candidates.length) {
        closeCompletions();
        return;
    }

    /// Do not pop up the list on a mere cursor move; only open after a typed word character.
    if (!completionCandidates.length && !allowOpen) {
        return;
    }

    /// Preserve the selection if the candidate list is unchanged (e.g. on a cursor-only event).
    const sameList = candidates.length === completionCandidates.length
        && candidates.every((c, i) => c === completionCandidates[i]);
    if (!sameList || id.prefix !== completionPrefix || id.start !== completionPrefixStart) {
        completionSelected = 0;
    }

    completionCandidates = candidates;
    completionPrefix = id.prefix;
    completionPrefixStart = id.start;
    renderCompletions();
}

/// Redraw both the backdrop (to refresh the reserved spacer for the selected candidate) and
/// the overlay. The backdrop render is guarded so it does not recurse into `updateCompletions`.
function renderCompletions() {
    inRenderBackdrop = true;
    renderQueryBackdrop();
    inRenderBackdrop = false;
    renderCompletionOverlay();
}

function renderCompletionOverlay() {
    if (!completionCandidates.length) {
        completionOverlay.style.display = 'none';
        return;
    }

    /// `caretEnd` is the cursor (end of the typed prefix); `caretStart` is the start of the
    /// identifier. The selected candidate shows only its suffix at the cursor (its prefix is
    /// the real typed text). The other candidates show the full word aligned at the identifier
    /// start, so their shared prefix lines up with the typed prefix and their suffixes line up
    /// at the cursor column.
    const caretEnd = getCaretCoordinates(completionPrefixStart + completionPrefix.length);
    const caretStart = getCaretCoordinates(completionPrefixStart);
    const scrollTop = query_area.scrollTop;
    const scrollLeft = query_area.scrollLeft;
    const total = completionCandidates.length;

    /// A window around the selection: up to MAX_COMPLETIONS_ABOVE items above and
    /// MAX_COMPLETIONS_BELOW below. Navigating moves the selection (and the window) through the
    /// full list; the selected item always stays on the cursor line.
    const winStart = Math.max(0, completionSelected - MAX_COMPLETIONS_ABOVE);
    const winEnd = Math.min(total - 1, completionSelected + MAX_COMPLETIONS_BELOW);

    const rowTop = (row) => (caretEnd.top + row * caretEnd.height - scrollTop) + 'px';

    completionOverlay.innerHTML = '';
    for (let i = winStart; i <= winEnd; ++i) {
        const word = completionCandidates[i];
        const selected = i === completionSelected;

        const entry = document.createElement('div');
        entry.className = 'completion-entry' + (selected ? ' completion-selected' : '');
        entry.textContent = selected ? word.substring(completionPrefix.length) : word;
        /// The selected candidate is always shown right at the cursor; the others are placed
        /// above/below by their distance from the selection, so navigating moves the whole
        /// block vertically while the selected one stays on the cursor line.
        entry.style.top = rowTop(i - completionSelected);
        entry.style.left = ((selected ? caretEnd.left : caretStart.left) - scrollLeft) + 'px';
        entry.dataset.index = i;

        /// Use mousedown (not click) and preventDefault so the textarea keeps focus.
        entry.addEventListener('mousedown', (e) => {
            e.preventDefault();
            e.stopPropagation();
            acceptCompletion(i);
        });

        completionOverlay.appendChild(entry);
    }

    /// "…" at the bottom when there are more candidates below the visible window.
    if (winEnd < total - 1) {
        const more = document.createElement('div');
        more.className = 'completion-entry completion-more';
        more.textContent = '…';
        more.style.top = rowTop(winEnd - completionSelected + 1);
        more.style.left = (caretStart.left - scrollLeft) + 'px';
        completionOverlay.appendChild(more);
    }

    completionOverlay.style.display = 'block';
}

function closeCompletions() {
    if (completionCandidates.length) {
        completionCandidates = [];
        completionSelected = 0;
        completionPrefix = '';
        completionPrefixStart = -1;
        completionOverlay.style.display = 'none';
        completionOverlay.innerHTML = '';
        /// Redraw the backdrop to drop the reserved spacer (unless we are already inside a
        /// backdrop render).
        if (!inRenderBackdrop) {
            inRenderBackdrop = true;
            renderQueryBackdrop();
            inRenderBackdrop = false;
        }
    }
}

function acceptCompletion(index) {
    if (index === undefined) index = completionSelected;
    if (index < 0 || index >= completionCandidates.length) return;

    const word = completionCandidates[index];
    /// Capture the prefix and its position before closeCompletions() resets them.
    const prefix = completionPrefix;
    const start = completionPrefixStart;
    completionUsage.set(word, (completionUsage.get(word) || 0) + 1);

    closeCompletions();

    /// Nothing to do when the word is exactly what was already typed (same text, same case).
    if (word === prefix) {
        return;
    }

    /// Replace the whole typed identifier with the canonical-cased completion word, so the
    /// already-typed prefix also takes the suggestion's case (e.g. "se" + accept -> "SELECT").
    /// Done via a selection + execCommand so it participates in the undo history and fires an
    /// `input` event (which refreshes the backdrop and recomputes completions).
    ///
    /// The `input` event from this programmatic insertion carries the inserted word as
    /// `e.data`, which would otherwise re-arm the open request and reopen the list (e.g.
    /// accepting `count` would reopen on `countIf`). Suppress that for the duration of the edit.
    completionAccepting = true;
    query_area.focus();
    query_area.setSelectionRange(start, start + prefix.length);
    document.execCommand('insertText', false, word);
    completionAccepting = false;
}

/// Force the completion list to open at the current cursor (used as a manual Tab trigger),
/// bypassing the "only open after typing a word character" and Esc-dismissal gates. Returns
/// true if it opened.
function tryOpenCompletions() {
    completionSuppressedKey = null;
    completionOpenRequested = true;
    updateCompletions();
    if (!completionCandidates.length) {
        completionOpenRequested = false;
        return false;
    }
    return true;
}

/// Capture-phase key handling so it runs before the textarea's own `onkeydown` (which would
/// otherwise treat Tab as "insert spaces").
query_area.addEventListener('keydown', (e) => {
    if (!completionCandidates.length) {
        /// Completions are closed: Tab at the end of a word manually opens them if a
        /// continuation is possible; otherwise let the default Tab (indentation) happen.
        if (e.key === 'Tab' && !e.shiftKey && !e.ctrlKey && !e.metaKey && !e.altKey) {
            if (tryOpenCompletions()) {
                e.preventDefault();
                e.stopImmediatePropagation();
            }
        }
        return;
    }
    /// Plain Enter accepts the completion; Ctrl/Cmd+Enter is left alone so it still runs the query.
    if (e.key === 'Tab' || e.key === 'ArrowRight' || (e.key === 'Enter' && !e.ctrlKey && !e.metaKey)) {
        e.preventDefault();
        e.stopImmediatePropagation();
        acceptCompletion(completionSelected);
    } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        e.stopImmediatePropagation();
        completionSelected = (completionSelected + 1) % completionCandidates.length;
        renderCompletions();
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        e.stopImmediatePropagation();
        completionSelected = (completionSelected - 1 + completionCandidates.length) % completionCandidates.length;
        renderCompletions();
    } else if (e.key === 'Escape') {
        e.preventDefault();
        e.stopImmediatePropagation();
        completionSuppressedKey = completionPrefixStart + ':' + completionPrefix;
        closeCompletions();
    }
}, true);

/// Arm the completion list to open only when the user actually types word characters.
/// This listener is registered before the one that drives tokenization, so the flag is set
/// by the time the post-tokenize `updateCompletions` runs. `e.data` holds the inserted text
/// (null for deletions); composition input also carries the composed text.
query_area.addEventListener('input', (e) => {
    if (completionAccepting) {
        /// Programmatic insertion from accepting a completion — do not treat as typing.
        completionOpenRequested = false;
        return;
    }
    const typed = e.data;
    completionOpenRequested = typeof typed === 'string' && /^\w+$/.test(typed);
});

/// Clicking outside the completion entries closes the list.
document.addEventListener('mousedown', (e) => {
    if (completionCandidates.length && !e.target.closest('.completion-entry')) {
        closeCompletions();
    }
});

/// Load completions the first time the textarea is focused.
query_area.addEventListener('focus', loadCompletions);

/// Query parameters support: detect {name:Type} placeholders and show input fields.

let queryParamsContainer = document.getElementById('query-params');
let currentQueryParams = [];
let updateQueryParamsGeneration = 0;

function extractQueryParams(tokens)
{
    const params = [];
    const seen = new Set();
    const significant = tokens.filter(t => t.significant);

    for (let i = 0; i < significant.length - 3; i++)
    {
        if (significant[i].token === '{' && significant[i + 2].token === ':')
        {
            const name = significant[i + 1].token;
            if (/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(name) && !seen.has(name))
            {
                for (let j = i + 3; j < significant.length; j++)
                {
                    if (significant[j].token === '}')
                    {
                        const type = significant.slice(i + 3, j).map(t => t.token).join('');
                        params.push({name: name, type: type});
                        seen.add(name);
                        break;
                    }
                }
            }
        }
    }

    return params;
}

function getParamValues()
{
    const values = {};
    for (const param of currentQueryParams)
    {
        const input = document.getElementById('param-' + param.name);
        if (input)
        {
            values[param.name] = input.value;
        }
    }
    return values;
}

function setParamValues(values)
{
    if (!values) return;
    for (const [name, value] of Object.entries(values))
    {
        const input = document.getElementById('param-' + name);
        if (input)
        {
            input.value = value;
            input.dispatchEvent(new Event('input'));
        }
    }
}

async function updateQueryParams()
{
    if (typeof WebAssembly !== 'object' || typeof WebAssembly.instantiate !== 'function')
    {
        return;
    }

    /// Bump the generation up-front so that any in-flight older runs (which only
    /// check this counter after their `await tokenize`) see a newer value and bail
    /// out — including the empty-query fast path below, where we would otherwise
    /// clear state and return, and a stale older run could then overwrite it.
    const generation = ++updateQueryParamsGeneration;

    const query = query_area.value;
    if (!query)
    {
        queryParamsContainer.innerHTML = '';
        currentQueryParams = [];
        updateRunButtons(false);
        updateQueryBackdrop('', [], []);
        return;
    }

    /// If tokenization or rendering throws (e.g. the query is larger than the WASM
    /// memory window currently allocated to the lexer), fall back to the unstyled
    /// textarea instead of leaving the previous `.has-backdrop` state in place —
    /// otherwise `#query.has-backdrop` keeps the real text invisible
    /// (`color: transparent`) while the stale backdrop is shown.
    let tokens;
    try
    {
        tokens = await tokenize(query);
    }
    catch (e)
    {
        if (generation !== updateQueryParamsGeneration) { return; }
        console.error('Tokenization failed, disabling syntax highlighting:', e);
        updateQueryBackdrop('', [], []);
        return;
    }
    if (generation !== updateQueryParamsGeneration) { return; }
    const params = extractQueryParams(tokens);

    /// Detect multi-query mode from the same token stream.
    const boundaries = getQueryBoundaries(tokens, query);
    updateRunButtons(boundaries.length > 1);
    try
    {
        updateQueryBackdrop(query, tokens, boundaries);
    }
    catch (e)
    {
        console.error('Rendering syntax highlighting failed, disabling backdrop:', e);
        updateQueryBackdrop('', [], []);
    }

    if (JSON.stringify(params) === JSON.stringify(currentQueryParams))
    {
        return;
    }

    const oldValues = getParamValues();
    currentQueryParams = params;
    queryParamsContainer.innerHTML = '';

    for (const param of params)
    {
        const wrapper = document.createElement('span');
        wrapper.className = 'query-param';

        const label = document.createElement('label');
        label.textContent = param.name + ':';
        label.setAttribute('for', 'param-' + param.name);
        wrapper.appendChild(label);

        let placeholder = param.type;
        if (/^Date$/.test(param.type)) placeholder = 'YYYY-MM-DD';
        else if (/^DateTime/.test(param.type)) placeholder = 'YYYY-MM-DD hh:mm:ss';

        const input = document.createElement('input');
        input.type = 'text';
        input.id = 'param-' + param.name;
        input.className = 'monospace shadow';
        input.spellcheck = false;
        input.placeholder = placeholder;
        if (oldValues[param.name] !== undefined)
        {
            input.value = oldValues[param.name];
        }
        input.addEventListener('input', function()
        {
            /// Resize to fit the value, clamped between 10em and 20em.
            this.style.width = '10em';
            if (this.scrollWidth > this.clientWidth)
            {
                this.style.width = Math.min(this.scrollWidth, this.clientWidth * 2) + 'px';
            }
        });
        wrapper.appendChild(input);

        queryParamsContainer.appendChild(wrapper);

        /// Trigger resize after the element is in the DOM so scrollWidth is valid.
        input.dispatchEvent(new Event('input'));
    }
}

query_area.addEventListener('input', () =>
{
    resizeQueryAreaIfSlightlyOverflowing();

    /// Run the update synchronously instead of with a setTimeout: the heavy work
    /// (WASM tokenize, building backdrop HTML) is fast, and the await chain inside
    /// `updateQueryParams` runs in microtasks — i.e. it finishes before the browser
    /// paints the next frame. If we deferred this with `setTimeout`, the browser
    /// would render one frame with the textarea's own text hidden (`color:
    /// transparent` from `.has-backdrop`) and the backdrop still showing the
    /// pre-edit contents, so the freshly typed characters would be invisible.
    updateQueryParams();
});

function setColorTheme(new_theme, update_preference) {
    theme = new_theme;
    if (update_preference) {
        window.localStorage.setItem('theme', theme);
    }
    document.documentElement.setAttribute('data-theme', theme);
    resultEl.redrawChart();
}
/// First we check if theme is set via the 'theme' GET parameter, if not, we check localStorage, otherwise we check OS preference.
let theme = current_url.searchParams.get('theme');
if (['dark', 'light'].indexOf(theme) === -1) {
    theme = window.localStorage.getItem('theme');
}

if (theme) {
    document.documentElement.setAttribute('data-theme', theme);
} else {
    /// Obtain system-level user preference
    const media_query_list = window.matchMedia('(prefers-color-scheme: dark)');
    if (media_query_list.matches) {
        setColorTheme('dark');
    } else {
        setColorTheme('light');
    }

    /// There is a rumor that on some computers, the theme is changing automatically on day/night.
    media_query_list.addEventListener('change', function(e) {
        setColorTheme(e.matches ? 'dark' : 'light');
    });
}

/// Detect query parameters on page load and restore their values from the URL.
/// If run_immediately is set, run the query after params are ready.
if (query_area.value)
{
    resizeQueryAreaIfSlightlyOverflowing();
    updateQueryParams().then(() =>
    {
        const urlParamValues = {};
        for (const param of currentQueryParams)
        {
            const value = current_url.searchParams.get('param_' + param.name);
            if (value !== null)
            {
                urlParamValues[param.name] = value;
            }
        }
        setParamValues(urlParamValues);
        if (run_immediately)
        {
            postAll();
        }
    });
}
else if (run_immediately)
{
    postAll();
}

document.getElementById('toggle-light').onclick = function() {
    setColorTheme('light', true);
}

document.getElementById('toggle-dark').onclick = function() {
    setColorTheme('dark', true);
}

/// Make the icon "buttons" (copy, download) and the theme switcher reachable and
/// operable from the keyboard: Tab focuses them, Enter/Space activates them.
/// (Real <button> elements like Run already get this for free.)
function makeButtonLike(elem, action)
{
    elem.setAttribute('tabindex', '0');
    elem.setAttribute('role', 'button');
    elem.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            action();
        }
    });
}

makeButtonLike(document.getElementById('copy-div'), () => document.getElementById('copy-div').click());
makeButtonLike(document.getElementById('download-div'), () => document.getElementById('download-div').click());
makeButtonLike(document.getElementById('theme'), () => setColorTheme(theme === 'dark' ? 'light' : 'dark', true));

// Copy raw result to clipboard
document.getElementById('copy-div').addEventListener('click', function() {
    let text = resultEl.rawText;
    if (!text) return;

    let button = this;
    let showBalloon = function(message) {
        let balloon = document.createElement('span');
        balloon.className = 'copy-balloon';
        balloon.textContent = message;
        button.appendChild(balloon);
        balloon.addEventListener('animationend', () => balloon.remove());
    };

    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(
            () => showBalloon('Result copied'),
            () => showBalloon('Copy failed'));
    } else {
        showBalloon('Copy not supported');
    }
});

// Download functionality
let last_query_for_download = '';
let last_params_for_download = {};

// Toggle download dropdown
document.getElementById('download-div').addEventListener('click', function(e) {
    e.stopPropagation();
    const dropdown = document.getElementById('download-dropdown');
    const button = document.getElementById('download-div');
    const context = document.getElementById('main');

    if (dropdown.classList.contains('show')) {

        dropdown.classList.add('show');
        const button_rect = button.getBoundingClientRect();
        const context_rect = context.getBoundingClientRect();
        const dropdown_rect = dropdown.getBoundingClientRect();

        dropdown.style.top = (button_rect.top - context_rect.top) + 'px';
        dropdown.style.left = (button_rect.left - context_rect.left + button_rect.width - dropdown_rect.width) + 'px';

        // Move focus into the menu so keyboard users land on the format selection.
        document.getElementById('download-format').focus();
    }
});

// Prevent dropdown from closing when clicking inside it
document.getElementById('download-dropdown').addEventListener('click', function(e) {
    e.stopPropagation();
});

// Close dropdown when clicking outside
document.addEventListener('click', function() {
    const dropdown = document.getElementById('download-dropdown');
    dropdown.classList.remove('show');
});

/// Keep the open download menu contiguous with the download button in the tab
/// order. The dropdown lives at the end of the DOM (so it is positioned without
/// being clipped), so without this its controls would otherwise land at the very
/// end of the tab sequence. Tab/Shift+Tab flow:
///   download button -> format select -> [other format] -> Download button
/// and leaving either end closes the menu. Escape also closes it.
function downloadTabSequence() {
    const seq = [document.getElementById('download-div'), document.getElementById('download-format')];
    const other = document.getElementById('download-format-other');
    if (other.classList.contains('show')) seq.push(other);
    seq.push(document.getElementById('download-button'));
    return seq;
}

document.getElementById('main').addEventListener('keydown', e => {
    const dropdown = document.getElementById('download-dropdown');
    if (!dropdown.classList.contains('show')) return;

    if (e.key === 'Escape') {
        e.preventDefault();
        dropdown.classList.remove('show');
        document.getElementById('download-div').focus();
        return;
    }

    if (e.key !== 'Tab') return;

    const seq = downloadTabSequence();
    const idx = seq.indexOf(document.activeElement);
    if (idx < 0) return;

    if (!e.shiftKey) {
        if (idx < seq.length - 1) {
            e.preventDefault();
            seq[idx + 1].focus();
        } else {
            /// Past the last item: close the menu and continue to the next toolbar control.
            dropdown.classList.remove('show');
            e.preventDefault();
            document.getElementById('theme').focus();
        }
    } else {
        if (idx > 0) {
            e.preventDefault();
            seq[idx - 1].focus();
        } else {
            /// Before the download button: close the menu and let focus move naturally.
            dropdown.classList.remove('show');
        }
    }
});

// Handle "Other" format selection
document.getElementById('download-format').addEventListener('change', function() {
    const otherInput = document.getElementById('download-format-other');
    if (this.value === 'other') {
        otherInput.classList.add('show');
        otherInput.focus();
    } else {
        otherInput.classList.remove('show');
    }
});

const formatExtensions = {
  CSVWithNames: "csv",
  NDJSON: "jsonl",
  JSONEachRow: "jsonl",
  Markdown: "md"
};

// Handle download button click
document.getElementById('download-button').addEventListener('click', async function() {
    const formatSelect = document.getElementById('download-format');
    const formatOther = document.getElementById('download-format-other');

    let format = formatSelect.value;
    if (format === 'other') {
        format = formatOther.value.trim();
        if (!format) {
            alert('Please enter a format name');
            return;
        }
    }

    const extension = formatExtensions[format] || format.toLowerCase();

    // Get current values
    const user = user_elem.value;
    const password = password_elem.value;
    const server_address = url_elem.value;
    const query = last_query_for_download;

    if (!query) {
        alert('No query to download results for');
        return;
    }

    // Build download URL
    let url = server_address +
        (server_address.indexOf('?') >= 0 ? '&' : '?') +
        'add_http_cors_header=1' +
        '&enable_http_compression=1' +
        '&use_query_cache=1&enable_reads_from_query_cache=1&enable_writes_to_query_cache=0&query_cache_ttl=600&query_cache_nondeterministic_function_handling=save&query_cache_system_table_handling=ignore' +
        '&default_format=' + encodeURIComponent(format) +
        '&http_response_headers=' + encodeURIComponent(`{'Content-Disposition':'attachment; filename="result.${encodeURIComponent(extension)}"'}`);
    if (user) url += '&user=' + encodeURIComponent(user);
    if (password) url += '&password=' + encodeURIComponent(password);

    for (const [name, value] of Object.entries(last_params_for_download))
    {
        url += '&param_' + encodeURIComponent(name) + '=' + encodeURIComponent(value);
    }

    let downloadQuery = query.replaceAll(/\bFORMAT\s+\w+/ig, '');

    // Create a form and submit it to trigger download
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = url;
    form.enctype = 'multipart/form-data';
    form.style.display = 'none';

    const queryInput = document.createElement('input');
    queryInput.type = 'hidden';
    queryInput.name = 'query';
    queryInput.value = downloadQuery;
    form.appendChild(queryInput);

    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);

    // Close dropdown
    document.getElementById('download-dropdown').classList.remove('show');
});

// Web Terminal integration
{
    const terminalIcon = document.getElementById('terminal-icon');
    const terminalPanel = document.getElementById('terminal-panel');
    const terminalResizer = document.getElementById('terminal-resizer');
    const mainEl = document.getElementById('main');
    let terminalIframe = null;
    let terminalActive = false;
    let terminalHiddenByResize = false;
    /// Origin the iframe was loaded from, used as the target origin for `postMessage`.
    /// Captured once when the iframe is created so it stays in sync with `iframe.src`
    /// even if the user later edits the server URL field.
    let terminalOrigin = null;
    const MIN_TERMINAL_HEIGHT = 20;

    /// The `/webterminal` endpoint lives on the ClickHouse server addressed by `url_elem.value`,
    /// which may differ from the page's own origin when the page is opened locally with `?url=...`.
    /// Resolve both the availability probe and the iframe `src` against the same configured server URL.
    /// Returns `null` if the configured URL cannot be parsed, so the caller can treat the terminal
    /// as unavailable instead of letting the exception abort `play.html` initialization.
    function getTerminalURL() {
        try {
            return new URL('/webterminal', url_elem.value).href;
        } catch (e) {
            return null;
        }
    }

    /// Keep the icon's `href` pointing at the current `/webterminal` URL, so that a native
    /// middle-click or Ctrl/Shift+click opens the right address even after the user edits the
    /// server URL. The `href` is removed when the URL is currently unparsable: an empty `href`
    /// would resolve to the current page, so a modifier/middle-click would open Play itself
    /// instead of doing nothing.
    ///
    /// The non-empty Play username is carried over as a `user` query parameter so a new-tab
    /// terminal connects as the same user instead of falling back to the server default user.
    /// The password is intentionally omitted (it would leak in the URL); `webterminal.html`
    /// prompts for it on the first authentication failure. This `user` parameter is added only
    /// to the anchor `href` used for new-tab navigation, never to `getTerminalURL`: that one
    /// also feeds the inline iframe `src`, where a `?user=` would set `userFromURL` and stop the
    /// iframe from waiting for the credentials `play.html` sends via `postMessage`.
    function updateTerminalHref() {
        const base = getTerminalURL();
        if (!base) { terminalIcon.removeAttribute('href'); return; }
        try {
            const url = new URL(base);
            if (user_elem.value) url.searchParams.set('user', user_elem.value);
            terminalIcon.setAttribute('href', url.href);
        } catch (e) {
            terminalIcon.setAttribute('href', base);
        }
    }

    /// Hide the terminal icon if /webterminal is not available (gated by allow_experimental_webterminal).
    terminalIcon.style.display = 'none';
    const terminalProbeURL = getTerminalURL();
    if (terminalProbeURL) {
        updateTerminalHref();
        fetch(terminalProbeURL, {method: 'HEAD'}).then(function(resp) {
            if (resp.ok) terminalIcon.style.display = '';
        }).catch(function() {});
    }

    function sendCredentialsToTerminal() {
        if (terminalIframe && terminalIframe.contentWindow && terminalOrigin) {
            terminalIframe.contentWindow.postMessage({
                type: 'webterminal-credentials',
                user: user_elem.value,
                password: password_elem.value || ''
            }, terminalOrigin);
        }
    }

    /// Keep the `--terminal-height` CSS variable in sync so the side menu can
    /// size itself as `100vh - terminal_height` and its bottom icons stay visible.
    function updateTerminalHeightVar() {
        const h = terminalActive ? terminalPanel.offsetHeight : 0;
        document.documentElement.style.setProperty('--terminal-height', h + 'px');
    }

    function activateTerminal() {
        if (terminalActive) return;
        /// Bail out before mutating any state if the configured server URL is currently invalid.
        /// The icon is only shown when the initial probe succeeded, so this can happen only if the
        /// user edited `url_elem.value` to something unparsable between page load and this click.
        const terminalSrc = terminalIframe ? null : getTerminalURL();
        if (!terminalIframe && !terminalSrc) return;
        terminalActive = true;
        terminalIcon.classList.add('active');
        terminalPanel.classList.add('active');

        if (!terminalIframe) {
            terminalPanel.style.height = Math.round(window.innerHeight * 0.4) + 'px';
            terminalIframe = document.createElement('iframe');
            terminalIframe.id = 'terminal-iframe';
            terminalOrigin = new URL(terminalSrc).origin;
            terminalIframe.src = terminalSrc;
            terminalIframe.addEventListener('load', sendCredentialsToTerminal);
            terminalPanel.insertBefore(terminalIframe, terminalResizer);
        } else if (terminalHiddenByResize) {
            terminalPanel.style.height = Math.round(window.innerHeight * 0.4) + 'px';
        }
        terminalHiddenByResize = false;
        updateTerminalHeightVar();

        // Tell the iframe to refit the terminal after becoming visible again, and focus it
        if (terminalIframe && terminalIframe.contentWindow && terminalOrigin) {
            terminalIframe.contentWindow.postMessage({type: 'webterminal-refit'}, terminalOrigin);
            terminalIframe.focus();
        }
    }

    /// Hide the terminal panel but keep the iframe alive so the session persists.
    function hideTerminal() {
        if (!terminalActive) return;
        terminalActive = false;
        terminalIcon.classList.remove('active');
        terminalPanel.classList.remove('active');
        updateTerminalHeightVar();
    }

    /// Destroy the terminal: remove the iframe and hide the panel.
    function closeTerminal() {
        hideTerminal();
        if (terminalIframe) {
            terminalIframe.remove();
            terminalIframe = null;
            terminalOrigin = null;
        }
    }

    function toggleTerminal() {
        if (terminalActive) hideTerminal();
        else activateTerminal();
    }

    /// Ctrl/Cmd/Shift+click opens the terminal in a new browser tab; let the anchor's native
    /// behaviour handle it (middle-click does not fire a `click` event and is handled natively too).
    function wantsNewTab(e) {
        return e.ctrlKey || e.metaKey || e.shiftKey;
    }

    /// Refresh the `href` before navigation so a new-tab open uses the current server URL.
    /// `pointerdown` fires before both `click` and the middle-button `auxclick` navigation.
    terminalIcon.addEventListener('pointerdown', updateTerminalHref);

    terminalIcon.addEventListener('click', function(e) {
        /// For a modifier-click, fall through to the anchor's native "open in new tab".
        if (wantsNewTab(e)) return;
        /// A plain left click toggles the inline terminal panel instead of navigating.
        e.preventDefault();
        e.stopPropagation();
        toggleTerminal();
    });

    // ~ key toggles terminal (Quake-style), but not when typing in inputs
    document.addEventListener('keydown', function(e) {
        if ((e.key === '`' || e.key === '~') && !e.ctrlKey && !e.altKey && !e.metaKey) {
            const tag = e.target.tagName;
            if (tag === 'INPUT' || tag === 'SELECT' || e.target.isContentEditable) return;
            // In the query textarea: activate terminal if ~ is typed into an empty field
            if (tag === 'TEXTAREA' && e.target.id === 'query') {
                if (!terminalActive && e.target.value === '') {
                    e.preventDefault();
                    activateTerminal();
                }
                return;
            }
            e.preventDefault();
            toggleTerminal();
        }
    });

    // Drag-to-resize terminal panel
    let termDrag = { active: false, startY: 0, startHeight: 0 };

    terminalResizer.addEventListener('pointerdown', function(e) {
        if (e.button !== 0) return;
        termDrag.active = true;
        termDrag.startY = e.clientY;
        termDrag.startHeight = terminalPanel.offsetHeight;
        terminalResizer.classList.add('terminal-resizer-dragging');

        // Overlay to prevent iframe from stealing pointer events
        const overlay = document.createElement('div');
        overlay.id = 'terminal-drag-overlay';
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;cursor:row-resize;';
        document.body.appendChild(overlay);

        document.addEventListener('pointermove', termMove);
        document.addEventListener('pointerup', termStop);
        document.addEventListener('pointercancel', termStop);
    });

    function termMove(e) {
        if (!termDrag.active) return;
        const newHeight = termDrag.startHeight + (e.clientY - termDrag.startY);
        if (newHeight < MIN_TERMINAL_HEIGHT) {
            terminalHiddenByResize = true;
            hideTerminal();
            termStop(e);
            return;
        }
        terminalPanel.style.height = newHeight + 'px';
        updateTerminalHeightVar();
    }

    function termStop() {
        termDrag.active = false;
        terminalResizer.classList.remove('terminal-resizer-dragging');
        const overlay = document.getElementById('terminal-drag-overlay');
        if (overlay) overlay.remove();

        document.removeEventListener('pointermove', termMove);
        document.removeEventListener('pointerup', termStop);
        document.removeEventListener('pointercancel', termStop);
    }

    terminalResizer.addEventListener('touchstart', function(e) { e.preventDefault(); });

    // Listen for messages from the webterminal iframe
    window.addEventListener('message', function(e) {
        if (!e.data) return;
        if (e.data.type === 'webterminal-closed') {
            closeTerminal();
        } else if (e.data.type === 'webterminal-escape') {
            hideTerminal();
        }
    });
}
