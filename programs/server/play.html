    _appendHeaderResizer(header)
    {
        let drag_state = {
            elem: null,
            is_dragging: true,
            offset_x: null,
            offset_width: null
        };

        const start = (e) => {
            if (e.button !== 0) { return; }

            this._changeTableLayout();
            drag_state.offset_x = e.clientX;
            drag_state.offset_width = header.offsetWidth;
            drag_state.is_dragging = true;
            drag_state.elem = e.target;
            drag_state.elem.classList.add('resizer-dragging');

            document.addEventListener('pointermove', move);
            document.addEventListener('pointerup', stop);
            document.addEventListener('pointercancel', stop);
        };

        const move = (e) => {
            if (!drag_state.is_dragging) { return; }

            const dx = e.clientX - drag_state.offset_x;
            header.style.width = `${drag_state.offset_width + dx}px`;
            if (dx < 0)
            {
                const table = this._dataTable;
                table.style.setProperty('--table-width', `${table.offsetWidth + dx}px`);
            }
        };

        const stop = (e) => {
            drag_state.is_dragging = false;
            drag_state.elem.classList.remove('resizer-dragging');

            document.removeEventListener('pointermove', move);
            document.removeEventListener('pointerup', stop);
            document.removeEventListener('pointercancel', stop);
        };

        const resizer = document.createElement('div');
        resizer.className = 'resizer';
        resizer.addEventListener('pointerdown', start);
        resizer.addEventListener('touchstart', (e) => e.preventDefault());

        header.appendChild(resizer);
    }

    renderError(message)

    _handleKeyDown(e)
    {

        let cell = this._current_selected_cell;

        if (!cell)
        {
            /// The table is focused (e.g. via Tab) but nothing is selected yet:
            /// the first arrow key selects the first data cell so keyboard
            /// navigation can begin. Other keys (including Tab) are left alone so
            /// focus can move on to the next element.
            if (arrows.includes(e.key))

                if (first_cell)

                    e.preventDefault();
                    this._selectCell(first_cell);

            return;
        }

        if (e.key === 'Escape')
        {
            e.preventDefault();
            this.clearSelection();
            return;
        }

        const row = cell.parentElement;
        const table = row.parentElement;
        let cell_index = cell.cellIndex;

        /// use `sectionRowIndex` (not table-wide `rowIndex`, which counts the header)
        /// so both sides share the same coordinate system.
        let row_index = row.sectionRowIndex;

        switch(e.key)
        {
            case 'ArrowUp': --row_index; break;
            case 'ArrowDown': ++row_index; break;
            case 'ArrowLeft': --cell_index; break;
            case 'ArrowRight': ++cell_index; break;
            default:
                return;
        }

        if (row_index < 0 || cell_index <= 0) { return; }

        let new_cell = table.rows[row_index]?.cells[cell_index];
        if (!new_cell) { return; }

        e.preventDefault();

        cell.removeAttribute('tabindex');
        this._selectCell(new_cell);
    }

    _loadJS(src, integrity)

            if (integrity)

                script.integrity = integrity;
            }
            else if (!src.startsWith('/'))
            {

            }
            script.addEventListener('load', function() { resolve(true); });
            document.head.appendChild(script);

    _legendAsTooltipPlugin({ className, style = {} } = {})
    {

        {
            legendEl = u.root.querySelector(".u-legend");

            className && legendEl.classList.add(className);

            uPlot.assign(legendEl.style, {
                textAlign: "right",
                pointerEvents: "none",
                display: "none",
                position: "absolute",
                left: 0,
                top: 0,
                zIndex: 100,
                boxShadow: "2px 2px 10px rgba(0, 0, 0, 0.1)",
                ...style
            });

            const nodes = legendEl.querySelectorAll("th");
            for (let i = 0; i < nodes.length; i++)

            if (opts.series.length == 2)
            {
                multiline = false;
                for (let i = 0; i < nodes.length; i++)
                    nodes[i].style.display = "none";
            }
            else
            {
                multiline = true;
                legendEl.querySelector("th").remove();
                legendEl.querySelector("td").setAttribute('colspan', '2');
                legendEl.querySelector("td").style.textAlign = 'center';
                let footer = legendEl.insertRow().insertCell();
                footer.setAttribute('colspan', '2');
                footer.style.textAlign = 'center';
                footer.classList.add('u-value');
                footer.parentNode.classList.add('u-series','footer');
                footer.textContent = ". . .";

            const overEl = u.over;
            overEl.style.overflow = "visible";

            overEl.appendChild(legendEl);

            overEl.addEventListener("mouseenter", () => {legendEl.style.display = null;});
            overEl.addEventListener("mouseleave", () => {legendEl.style.display = "none";});

        function update(u)
        {
            let { left, top } = u.cursor;
            left -= legendEl.clientWidth * (left / u.width);
            if (top >= legendEl.clientHeight)
            {
                top -= legendEl.clientHeight;
            }
            legendEl.style.transform = "translate(" + left + "px, " + top + "px)";

            if (multiline)
            {
                let nodes = nodeListToArray(legendEl.querySelectorAll("tr"));
                let header = nodes.shift();
                let footer = nodes.pop();
                let showLimit = Math.floor(u.height / 30);
                nodes.forEach(function (node) { node._sort_key = nodes.length > showLimit ? +node.querySelector("td").textContent.replace(/,/g,'') : node._order; });
                nodes.sort((a, b) => b._sort_key - a._sort_key);
                nodes.forEach(function (node) { node.parentNode.appendChild(node); });
                for (let i = 0; i < nodes.length; i++)
                {
                    nodes[i].style.display = i < showLimit ? null : "none";
                }
                footer.parentNode.appendChild(footer);
                footer.style.display = nodes.length > showLimit ? null : "none";
            }
        }

        return {
            hooks: {
                init: init,
                setCursor: update,
            }
        };
    }

    async renderChart(json)
    {

        if (this._uplot)
        {
            this._uplot.destroy();
            this._uplot = null;
        }

        let chart = this._chart;

        let paths = json[0].length < chart.clientWidth / 5 ? uPlot.paths.bars() : uPlot.paths.linear();

                        ticks: { width: 1 / devicePixelRatio, stroke: grid_color } },
                    { stroke: axes_color,
                        grid: { width: 1 / devicePixelRatio, stroke: grid_color },
                        ticks: { width: 1 / devicePixelRatio, stroke: grid_color } } ],

            padding: [ null, null, null, (Math.ceil(Math.log10(Math.max(...json[1]))) + Math.floor(Math.log10(Math.max(...json[1])) / 3)) * 6 ],

    _resizeChart()
    {
        if (this._uplot)
        {
            let chart = this._chart;
            this._uplot.setSize({ width: chart.clientWidth, height: chart.clientHeight });
        }
    }

    redrawChart()
    {
        if (this._uplot && this._chart.style.display == 'block')
        {
            this.renderChart(this._uplot.data);
        }
    }

    ++ping_request_num;
    const current_ping_request_num = ping_request_num;
    let elem = document.getElementById('url_status');
    elem.className = '';
    document.getElementById('server_info').innerText = '';
    ping(url_elem.value).then(status => {
        if (current_ping_request_num == ping_request_num) {
            elem.className = status ? 'ok' : 'fail';
            if (status) {
                checkCredentials();
            }
        }
    });
};

url_elem.addEventListener('input', checkURL);
checkURL();

/// The `/docs` page lives on the ClickHouse server addressed by `url_elem.value`, which may differ from
/// the page's own origin when `/play` is opened locally (`file://`) or pointed at a remote server.
/// Resolve the Documentation link against that configured server (like `getTerminalURL` does for the Web
/// Terminal) instead of leaving it hardcoded to `/docs`, and keep it in sync as the URL input changes.
{
    const docs_icon = document.getElementById('docs-icon');
    function updateDocsURL() {
        try {
            docs_icon.href = new URL('/docs', url_elem.value).href;
        } catch (e) {
            /// Leave the previous href in place while the configured URL is not parsable.
        }
    }
    url_elem.addEventListener('input', updateDocsURL);
    updateDocsURL();
}

async function auxiliaryQuery(server_address, user, password, query, url_params = '') {
    let url = server_address +
        (server_address.indexOf('?') >= 0 ? '&' : '?') +
        'add_http_cors_header=1&default_format=JSON' + url_params;
    if (user) url += '&user=' + encodeURIComponent(user);
    if (password) url += '&password=' + encodeURIComponent(password);

    let response;
    try {
        response = await fetch(url, { method: "POST", body: query, headers: { 'Authorization': 'never' } });
    } catch (e) {
        clear();
        resultEl.renderError("Network error");
        logoEl.style.display = 'none';
        return false;
    }
    if (!response.ok) {
        clear();
        resultEl.renderError(await response.text());
        logoEl.style.display = 'none';
        return false;
    }
    resultEl.clearError();
    logoEl.style.display = 'block';
    return await response.json();
}

async function getServerStatus(server_address, user, password) {
    let url = server_address +
        (server_address.indexOf('?') >= 0 ? '&' : '?') +
        'add_http_cors_header=1&default_format=JSONEachRow';
    if (user) url += '&user=' + encodeURIComponent(user);
    if (password) url += '&password=' + encodeURIComponent(password);
    try {
        let response = await fetch(url, { method: "POST", body: "SELECT version() AS v, uptime() AS t", headers: { 'Authorization': 'never' } });
        if (!response.ok) return false;
        json = await response.json();
        return json;
    } catch (e) {
        return false;
    }
}

let load_databases_request_num = 0;
async function loadDatabases(server_address, user, password) {
    ++load_databases_request_num;
    const current_load_databases_request_num = load_databases_request_num;

    let json = await auxiliaryQuery(server_address, user, password,
        `SELECT database, database = currentDatabase() AS current
            FROM system.databases WHERE database != 'INFORMATION_SCHEMA'
            ORDER BY
                database = 'information_schema',
                database = 'system',
                database != 'default',
                database`);
    if (!json) return false;

    if (current_load_databases_request_num != load_databases_request_num) return false;

    let databases_elem = document.getElementById('databases');
    while (databases_elem.firstChild) databases_elem.removeChild(databases_elem.firstChild);

    // Use natural order for database names
    json.data.sort((a, b) => {
        // Maintain original order for default, system, information_schema
        const getPriority = (name) => {
            switch (name) {
                case 'default': return 0;
                case 'system': return 2;
                case 'information_schema': return 3
                default: return 1;
            }
        }

        return getPriority(a.database) - getPriority(b.database)
            || a.database.localeCompare(b.database, undefined, { numeric: true });
    });

    for (let elem of json.data) {
        let database = document.createElement('div');
        database.className = 'database';
        let database_link = document.createElement('button');
        if (elem.current) database_link.className = 'current';
        database_link.append(elem.database);
        database.appendChild(database_link);
        let tables = document.createElement('div');
        tables.className = 'tables';
        database.appendChild(tables);
        databases_elem.appendChild(database);

        /// Refresh button shown to the right of the database name while it is open.
        /// Clicking it reloads the list of tables without collapsing the database.
        let refresh_button = document.createElement('button');
        refresh_button.className = 'database-refresh';
        refresh_button.type = 'button';
        refresh_button.title = 'Refresh the list of tables';
        refresh_button.textContent = '\u21BB';

        /// A per-row generation counter, bumped on every refresh and on collapse. An in-flight
        /// load captures the current value and, once its query returns, checks whether the row's
        /// state changed in the meantime (it was collapsed, a newer refresh superseded it, or the
        /// whole panel was closed) so it can bail out before mutating the DOM. This invariant is
        /// local to one database row, unlike the global `load_tables_request_num` (which only
        /// tracks the latest load across all rows and would wrongly cancel a concurrent open of a
        /// different row).
        let row_load_generation = 0;

        /// Reload tables, showing the hourglass (and hiding the refresh button) while loading.
        const refreshTables = () => {
            const generation = ++row_load_generation;
            /// A load stays relevant only while its generation is still the latest for this row
            /// and the row is still attached to the document. Closing the whole database panel
            /// (or reloading the database list) detaches the row without bumping the generation,
            /// so the `isConnected` check is what makes such a stale load drop quietly instead of
            /// dereferencing a now-detached parent when its query returns.
            const is_current = () => generation == row_load_generation && database.isConnected;
            refresh_button.style.visibility = 'hidden';
            let hourglass = document.createElement('span');
            hourglass.className = 'loading-hourglass';
            hourglass.textContent = '\u29D7';
            database_link.after(hourglass);
            return loadTables(server_address, user, password, elem.database, database, is_current).then(ok => {
                hourglass.remove();
                /// Only restore the button while this load is still the current one for the row;
                /// otherwise the row was collapsed (the button is detached) or a newer refresh owns it.
                if (is_current()) refresh_button.style.visibility = '';
                return ok;
            });
        };

        refresh_button.addEventListener('click', e => {
            e.stopPropagation();
            if (database.dataset['opened']) refreshTables();
        });

        database_link.addEventListener('click', e => {
            if (!database.dataset['opened']) {
                refreshTables().then(ok => {
                    if (ok !== false) {
                        database.dataset['opened'] = 1;
                        database_link.after(refresh_button);
                    }
                });
            } else {
                /// Collapse: invalidate any in-flight refresh so its late result cannot
                /// repopulate the table list of this now-closed row.
                ++row_load_generation;
                delete database.dataset['opened'];
                refresh_button.remove();
                while (tables.firstChild) tables.removeChild(tables.firstChild);
                let count_elem = database_link.querySelector('.database-table-count');
                if (count_elem) count_elem.remove();
            }
        });
    }
}

function makeSVG(viewBox, ...paths)
{
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', viewBox);
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
    svg.setAttribute('stroke-width', '2');
    svg.setAttribute('stroke-linecap', 'round');
    svg.setAttribute('stroke-linejoin', 'round');
    svg.classList.add('table-icon');
    for (const d of paths)
    {
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        svg.appendChild(path);
    }
    return svg;
}

function getTableIcon(engine)
{
    const e = engine.replace(/^Replicated|^Shared/, '');

    /// Aggregating/Summing - sigma
    if (/^(Summing|Aggregating)MergeTree/.test(e))
    {
        const svg = makeSVG('0 0 24 24',
            'M18 4 H6',     // top bar
            'M6 4 L16 12',  // upper diagonal
            'M16 12 L6 20', // lower diagonal
            'M6 20 H18'     // bottom bar
        );
        return svg;
    }

    /// Memory - microchip
    if (e === 'Memory')
    {
        const svg = makeSVG('0 0 24 24',
            'M6 6 h12 v12 h-12 z',  // chip body
            'M9 6 v-2', 'M12 6 v-2', 'M15 6 v-2',    // top pins
            'M9 18 v2', 'M12 18 v2', 'M15 18 v2',     // bottom pins
            'M6 10 h-2', 'M6 14 h-2',                  // left pins
            'M18 10 h2', 'M18 14 h2'                   // right pins
        );
        return svg;
    }

    /// View - eye
    if (e === 'View')
    {
        const svg = makeSVG('0 0 24 24',
            'M1 12 C5 5, 19 5, 23 12 C19 19, 5 19, 1 12 Z',  // eye outline
            'M12 9 a3 3 0 1 0 0 6 a3 3 0 1 0 0 -6'             // pupil
        );
        return svg;
    }

    /// MaterializedView - eye over table
    if (e === 'MaterializedView')
    {
        const svg = makeSVG('0 0 24 24',
            'M1 8 C5 2, 19 2, 23 8 C19 14, 5 14, 1 8 Z',  // eye
            'M12 5.5 a2.5 2.5 0 1 0 0 5 a2.5 2.5 0 1 0 0 -5', // pupil
            'M4 17 h16', 'M4 21 h16'                        // table lines
        );
        return svg;
    }

    /// Merge - three overlaid tables
    if (e === 'Merge')
    {
        const svg = makeSVG('0 0 24 24',
            'M8 8 h14 v14 h-14 z', 'M8 12 h14',     // back table (bottom-right)
            'M5 5 h14 v14 h-14 z', 'M5 9 h14',      // middle table
            'M2 2 h14 v14 h-14 z', 'M2 6 h14'       // front table (top-left)
        );
        svg.setAttribute('fill', 'var(--element-background-color)');
        return svg;
    }

    /// Distributed - fanout
    if (e === 'Distributed')
    {
        const svg = makeSVG('0 0 24 24',
            'M2 9.5 h6 v5 h-6 z',     // source box
            'M16 1 h6 v5 h-6 z',      // target top
            'M16 9.5 h6 v5 h-6 z',    // target middle
            'M16 18 h6 v5 h-6 z',     // target bottom
            'M8 12 L16 3.5',          // arrow top
            'M8 12 L16 12',           // arrow middle
            'M8 12 L16 20.5'          // arrow bottom
        );
        return svg;
    }

    /// StorageProxy - arrow between two boxes
    if (e === 'Proxy')
    {
        const svg = makeSVG('0 0 24 24',
            'M1 7 h6 v10 h-6 z',    // left box
            'M17 7 h6 v10 h-6 z',   // right box
            'M7 12 h10',            // arrow line
            'M14 9 l3 3 l-3 3'     // arrowhead
        );
        return svg;
    }

    /// Default MergeTree family - table
    const svg = makeSVG('0 0 24 24',
        'M3 4 h18 v16 h-18 z',  // border
        'M3 9 h18',             // header line
        'M3 14 h18',            // middle line
        'M10 9 v11'             // column divider
    );
    return svg;
}

let load_tables_request_num = 0;
async function loadTables(server_address, user, password, database, container, is_current) {
    ++load_tables_request_num;
    const current_load_tables_request_num = load_tables_request_num;

    let json = await auxiliaryQuery(server_address, user, password,
        `SELECT table, engine, total_rows, total_bytes FROM system.tables WHERE database = {database:String}
            ORDER BY table LIKE '.inner%', table`,
        '&param_database=' + encodeURIComponent(database));
    if (!json) return false;

    if (current_load_tables_request_num != load_tables_request_num) return false;
    /// The row this load targets may have been collapsed or superseded by a newer refresh while
    /// the query was in flight; if so, bail out before touching the DOM so we never repopulate
    /// the table list of a row that is no longer open.
    if (is_current && !is_current()) return false;

    container.parentElement.querySelector('.current').classList.remove('current');
    container.firstChild.classList.add('current');
    let tables_elem = container.querySelector('.tables');
    while (tables_elem.firstChild) tables_elem.removeChild(tables_elem.firstChild);

    /// Show the number of tables in parentheses next to the database name, e.g. `default (123)`.
    let database_link = container.firstChild;
    let count_elem = database_link.querySelector('.database-table-count');
    if (!count_elem) {
        count_elem = document.createElement('span');
        count_elem.className = 'database-table-count';
        database_link.appendChild(count_elem);
    }
    count_elem.textContent = ` (${json.data.length})`;

    let max_total_bytes = Math.max(...json.data.map(elem => +elem.total_bytes));

    // Use natural order for table names; .inner tables go last
    json.data.sort((a, b) => a.table.startsWith('.inner') - b.table.startsWith('.inner')
        || a.table.localeCompare(b.table, undefined, { numeric: true }));

    for (let elem of json.data) {
        let table = document.createElement('div');
        table.className = 'table';
        let table_link = document.createElement('button');
        /// Wrap the icon+name so the balloon opens only when hovering the name, not the
        /// empty right part of the full-width button.
        let table_name = document.createElement('span');
        table_name.className = 'table-name';
        table_name.append(getTableIcon(elem.engine), elem.table);
        table_link.appendChild(table_name);

        if (max_total_bytes && +elem.total_bytes) {
            const percent = Number(100 * +elem.total_bytes / max_total_bytes).toFixed(2);
            table.style.backgroundImage = `linear-gradient(to right,
                var(--table-size-bar-color) 0%,
                var(--table-size-bar-color) ${percent}%,
                transparent ${percent}%)`;
        }

        let table_addendum = document.createElement('span');
        table_addendum.className = 'table-addendum';

        const set_query_or_run = (e, value) => {
            if (query_area.value == value) {
                /// Double click will run the query.
                postOne();
            } else {
                query_area.value = value;
                query_area.dispatchEvent(new Event('input'));
            }
            /// #main is the scroll container (overflow: auto), so scroll it to bring the query area into view.
            document.getElementById('main').scrollTo(0, 0);
            e.stopPropagation();
        }

        const show_table_properties = e => set_query_or_run(e, `SELECT * FROM system.tables WHERE database = '${database}' AND table = '${elem.table}'`);

        if (+elem.total_bytes) {
            let bytes_elem = document.createElement('span');
            bytes_elem.className = 'table-addendum-elem';
            bytes_elem.textContent = formatReadableBytes(elem.total_bytes) + '\n';
            bytes_elem.addEventListener('click', show_table_properties);
            table_addendum.append(bytes_elem);
        }
        if (+elem.total_rows) {
            let rows_elem = document.createElement('span');
            rows_elem.className = 'table-addendum-elem';
            rows_elem.textContent = formatReadableRows(elem.total_rows) + ' rows\n';
            rows_elem.addEventListener('click', show_table_properties);
            table_addendum.append(rows_elem);
        }
        let engine_elem = document.createElement('span');
        engine_elem.textContent = elem.engine;
        engine_elem.className = 'table-addendum-elem';
        engine_elem.addEventListener('click', e => set_query_or_run(e, `SHOW TABLE "${database}"."${elem.table}"`));
        table_addendum.append(engine_elem);

        /// Make the balloon links reachable from the keyboard (Right arrow from the row).
        for (const link of table_addendum.querySelectorAll('.table-addendum-elem')) link.tabIndex = -1;

        table_name.addEventListener('mouseenter', () => positionTableBalloon(table));
        /// Show the balloon when the row is focused via keyboard navigation, too.
        table_link.addEventListener('focus', () => positionTableBalloon(table));

        /// Keep the addendum inside the button so the `.table-name ~ .table-addendum` hover
        /// selector works; it is position:fixed, so it is not clipped by the button overflow.
        table_link.appendChild(table_addendum);
        table.appendChild(table_link);
        table.addEventListener('click', e => set_query_or_run(e, `SELECT * FROM "${database}"."${elem.table}" LIMIT 100`));
        tables_elem.appendChild(table);
    }

    if (json.data.length == 0) {
        let table = document.createElement('div');
        table.className = 'no-tables';
        table.append('no tables');
        tables_elem.append(table);
    }
}

let databases_toggle = document.getElementById('databases-toggle');

let menu_elem = document.getElementById('menu');

/// Hide the currently visible table-info balloon on any scroll: it uses
/// position:fixed and would detach from its anchor. Use capture phase so the
/// listener fires regardless of which element scrolls (scroll events do not
/// bubble). Only one balloon can be open at a time (the one the cursor most
/// recently entered), so we track that reference instead of scanning the DOM.
///
/// Also set `suppress-balloons` on the body until the next mousemove, so a
/// different table button scrolled under a stationary cursor cannot reveal its
/// balloon at an unset position via the CSS `:hover` rule (`mouseenter` does
/// not fire without actual mouse movement, so JS positioning would be skipped).
let visible_balloon = null;
function hideTableBalloons() {
    if (visible_balloon) {
        visible_balloon.style.visibility = 'hidden';
        visible_balloon = null;
    }
    document.body.classList.add('suppress-balloons');
}

/// Anchor a table's balloon to the end of its name (clamped to the button when the
/// name is truncated), so it sits next to the text rather than the far-right edge.
/// Used on hover, on keyboard focus, and to keep it glued to the row across scrolls.
function positionTableBalloon(table) {
    const table_name = table.querySelector('.table-name');
    const table_link = table.querySelector('button');
    const table_addendum = table.querySelector('.table-addendum');
    if (!table_name || !table_addendum) return;
    const rect = table_name.getBoundingClientRect();
    const btn = table_link.getBoundingClientRect();
    table_addendum.style.left = Math.min(rect.right, btn.right) + 'px';
    table_addendum.style.top = (rect.top + rect.height / 2) + 'px';
    table_addendum.style.visibility = '';
    visible_balloon = table_addendum;
}

document.addEventListener('scroll', () => {
    /// When a table row (or one of its balloon links) is focused via the keyboard,
    /// keep its balloon glued to the row across the scroll instead of hiding it.
    const focused_table = document.activeElement?.closest?.('.table');
    if (focused_table && document.getElementById('databases').contains(focused_table)) {
        /// Still suppress hover-opened balloons on *other* rows: a different table
        /// button scrolled under a stationary cursor would otherwise reveal its
        /// balloon at an unset position via the CSS `:hover` rule (`mouseenter` does
        /// not fire without mouse movement). The focused row's balloon is exempted
        /// from `suppress-balloons` in CSS, so it stays glued to the row.
        document.body.classList.add('suppress-balloons');
        positionTableBalloon(focused_table);
    } else {
        hideTableBalloons();
    }
}, { capture: true, passive: true });
document.addEventListener('mousemove', () => {
    /// Guard so the no-op case does not touch classList on every mouse pixel.
    if (document.body.classList.contains('suppress-balloons')) {
        document.body.classList.remove('suppress-balloons');
    }
}, { passive: true });

function toggleDatabases() {
    if (!databases_toggle.dataset['opened']) {
        loadDatabases(url_elem.value, user_elem.value, password_elem.value).then(ok => {
            if (ok !== false) {
                databases_toggle.dataset['opened'] = 1;
                menu_elem.style.cursor = 'w-resize';
                menu_elem.classList.add('databases-opened');
            }
        });
    } else {
        delete databases_toggle.dataset['opened'];
        menu_elem.style.cursor = 'e-resize';
        menu_elem.classList.remove('databases-opened');
        let databases_elem = document.getElementById('databases');
        while (databases_elem.firstChild) databases_elem.removeChild(databases_elem.firstChild);
    }
}

/// The logo is an <a> element so that Ctrl/Cmd/Shift+click and middle-click
/// natively open the current page (with the query) in a new tab.
/// We update the href on mousedown so it always reflects the current URL.
document.getElementById('databases-icon').addEventListener('mousedown', () => {
    document.getElementById('databases-icon').href = window.location.href;
});

databases_toggle.addEventListener('click', e => {
    e.stopPropagation();
    /// Let the browser handle modifier clicks as a link (open in new tab).
    if (e.ctrlKey || e.metaKey || e.shiftKey) return;
    /// Normal click: toggle the databases panel instead of following the link.
    e.preventDefault();
    toggleDatabases();
});

/// The icon is an <a>, which the browser activates with Enter (following the
/// link) but not with Space. Handle both keys here so it can be toggled from the
/// keyboard once focused via Tab, instead of navigating away.
document.getElementById('databases-icon').addEventListener('keydown', e => {
    if (e.key !== ' ' && e.key !== 'Enter') return;
    if (e.ctrlKey || e.metaKey || e.shiftKey) return;
    e.preventDefault();
    toggleDatabases();
});

/// The "hide panel" button is only visible while the panel is open, so it always closes it.
document.getElementById('databases-hide').addEventListener('click', e => {
    e.stopPropagation();
    toggleDatabases();
});

/// Keyboard navigation inside the database panel. The event bubbles here from the
/// focused element.
///   - Up/Down move focus between the rows (databases and expanded tables),
///     mirroring Tab/Shift+Tab but staying within the panel.
///   - Right enters the focused table's balloon (its size/rows/engine links);
///     inside the balloon Up/Down move between links, Left returns to the row,
///     and Enter/Space activate the focused link.
document.getElementById('databases').addEventListener('keydown', e => {
    const active = document.activeElement;

    /// Within a table's balloon.
    if (active.classList && active.classList.contains('table-addendum-elem')) {
        const links = [...active.parentElement.querySelectorAll('.table-addendum-elem')];
        const i = links.indexOf(active);
        if (e.key === 'ArrowDown') { e.preventDefault(); links[Math.min(i + 1, links.length - 1)].focus({ preventScroll: true }); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); links[Math.max(i - 1, 0)].focus({ preventScroll: true }); }
        else if (e.key === 'ArrowLeft') { e.preventDefault(); active.closest('.table').querySelector('button').focus(); }
        else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); active.click(); }
        return;
    }

    /// Right arrow on a table row jumps into its balloon links.
    if (e.key === 'ArrowRight') {
        const link = active.querySelector && active.querySelector('.table-addendum-elem');
        if (link) { e.preventDefault(); link.focus({ preventScroll: true }); }
        return;
    }

    /// Up/Down move focus between the rows.
    if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
    const buttons = [...document.getElementById('databases').querySelectorAll('button')];
    if (buttons.length === 0) return;
    e.preventDefault();
    let index = buttons.indexOf(active);
    if (e.key === 'ArrowDown') {
        index = index < 0 ? 0 : Math.min(index + 1, buttons.length - 1);
    } else {
        index = index < 0 ? buttons.length - 1 : Math.max(index - 1, 0);
    }
    buttons[index].focus();
});

document.getElementById('menu').addEventListener('click', e => {
    if (e.ctrlKey || e.metaKey || e.shiftKey) return;
    if (!e.target.closest('#github-icon') && !e.target.closest('#databases-toggle') && !e.target.closest('button')) {
        toggleDatabases();
    }
});

function formatUptime(t) {
    if (t < 60) { return t + " sec" }
    if (t < 3600) { return Number(t / 60).toFixed() + " min" }
    if (t < 86400) { return Number(t / 3600).toFixed() + " hr" }
    const days = Number(t / 86400).toFixed();
    return days + " day" + (days > 1 ? 's' : '');
}

let check_credentials_request_num = 0;
function checkCredentials() {
    ++check_credentials_request_num;
    const current_check_credentials_request_num = check_credentials_request_num;
    getServerStatus(url_elem.value, user_elem.value, password_elem.value).then(json => {
        if (current_check_credentials_request_num == check_credentials_request_num) {
            if (json) {
                [user_elem, password_elem].forEach(e => { e.classList.remove('fail'); e.classList.add('ok'); });
                document.getElementById('server_info').innerText = `v${json.v}, uptime ${formatUptime(json.t)} `;
            } else {
                [user_elem, password_elem].forEach(e => { e.classList.remove('ok'); e.classList.add('fail'); });
            }
        }
    });
}

function resetCredentialsStatus() {
    [user_elem, password_elem].forEach(e => { e.classList.remove('ok'); e.classList.remove('fail'); });
}

user_elem.addEventListener('input', resetCredentialsStatus);
password_elem.addEventListener('input', resetCredentialsStatus);

/// The password is usually copy-pasted.
/// To not worry about extracting the clipboard data, but use the value instead,
/// and not worry too much about input/paste race, add the timeout.
user_elem.addEventListener('paste', () => setTimeout(checkCredentials, 100));
password_elem.addEventListener('paste', () => setTimeout(checkCredentials, 100));


function queryToColor(str) {
    let hash = 2166136261;
    for (let i = 0; i < str.length; i++) {
        hash ^= str.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
    }

    /// Limited range to avoid violet colors.
    return 50 + ((hash >>> 0) % 200);
}

function toBase64(str) {
    const encoder = new TextEncoder();
    const bytes = encoder.encode(str);
    const binary = Array.from(bytes, byte => String.fromCharCode(byte)).join('');
    return btoa(binary);
}

function fromBase64(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) { bytes[i] = binary.charCodeAt(i); }
    const decoder = new TextDecoder();
    return decoder.decode(bytes);
}

let elapsed_ns = 0;

const default_format = 'JSONStringsEachRowWithProgress';

let controller = null;
/// Execute a single query, rendering results into the given targetResultEl.
/// Returns { format, reply, response_ok, is_table, is_raw, is_chart, is_image, is_error }.
/// The caller is responsible for top-level UI (download buttons, history, favicon).
/// `abortController` is an AbortController that can be used to cancel this query.
async function postImpl(posted_request_num, query, targetResultEl, abortController, paramValuesSnapshot)
{
    const user = user_elem.value;
    const password = password_elem.value;
    const server_address = url_elem.value;
    let url = server_address +
        (server_address.indexOf('?') >= 0 ? '&' : '?') +
        /// Ask server to allow cross-domain requests.
        'add_http_cors_header=1';
    if (user) url += '&user=' + encodeURIComponent(user);
    if (password) url += '&password=' + encodeURIComponent(password);
    url += '&default_format=' + default_format + '&enable_http_compression=1';
    /// We will put the result in the query cache, so it can be used when download is initiated later.
    /// But we don't use cached results, so the results that we get here, are always fresh.
    url += '&use_query_cache=1&enable_reads_from_query_cache=0&enable_writes_to_query_cache=1&query_cache_ttl=600&query_cache_nondeterministic_function_handling=save&query_cache_system_table_handling=ignore';

    for (const [name, value] of Object.entries(paramValuesSnapshot))
    {
        url += '&param_' + encodeURIComponent(name) + '=' + encodeURIComponent(value);
    }

    /// Extremes only if the format is likely to be unchanged. This is imprecise.
    if (!query.match(/\bFORMAT\s+\w+/i)) url += '&extremes=1';

    targetResultEl.queryText = query;

    let is_table = false;
    let is_raw = false;
    let is_chart = false;
    let is_image = false;
    let is_error = false;

    let response, reply, format;
    reply = '';
    try {
        response = await fetch(url, { method: "POST", body: query, signal: abortController.signal,
            headers: { 'Authorization': 'never' } });

        format = response.headers.get('X-ClickHouse-Format') ?? default_format;
        /// Detect image results (e.g. `FORMAT PNG`) by the response `Content-Type` rather than by
        /// parsing the query, so any format that emits an image is rendered inline as a picture.
        const content_type = response.headers.get('Content-Type') ?? '';

        if (!response.ok) {
            is_error = true;
            reply = await response.text();
            if (posted_request_num != request_num) { return { cancelled: true }; }

            let has_exception = false;
            for (const line of reply.split('\n')) {
                if (line.startsWith(`{"exception":`)) {
                    targetResultEl.update(JSON.parse(line));
                    has_exception = true;
                    break;
                }
            }
            if (!has_exception) {
                targetResultEl.renderError(reply);
            }

            return { format, reply, response_ok: false, is_table, is_raw, is_chart, is_image, is_error };
        } else if (content_type.startsWith('image/')) {
            is_image = true;
            const blob = await response.blob();
            if (posted_request_num != request_num) { return { cancelled: true }; }
            targetResultEl.renderImage(blob);
        } else if (format == default_format) {
            is_table = true;
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (posted_request_num != request_num) { return { cancelled: true }; }
                if (done) break;

                let new_content = decoder.decode(value, { stream: true });
                buffer += new_content;
                reply += new_content;

                let lines = buffer.split('\n');
                let fragment = document.createDocumentFragment();

                let cont = true;
                for (const line of lines.slice(0, -1)) {
                    const data = JSON.parse(line);
                    cont = targetResultEl.update(data, fragment);
                    if (!cont) { break; }
                }

                targetResultEl.flushFragment(fragment);

                if (!cont)
                {
                    abortController.abort();
                    break;
                }
                buffer = lines[lines.length - 1];
            }
        } else if (format == 'JSONCompactColumns') {
            is_chart = true;
            reply = await response.text();
            if (posted_request_num != request_num) { return { cancelled: true }; }
            targetResultEl.renderChart(JSON.parse(reply));
        } else {
            is_raw = true;
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                let new_content = decoder.decode(value, { stream: true });
                reply += new_content;

                if (posted_request_num != request_num) { return { cancelled: true }; }
                targetResultEl.updateRaw(new_content);
            }
        }
    } catch (e) {
        if (posted_request_num != request_num) { return { cancelled: true }; }

        console.log(e);
        if (e instanceof TypeError) {
            reply = "Network error";
        } else if (e.name === 'AbortError') {
            reply = "Query was cancelled";
        } else {
            reply = e.toString();
        }
        targetResultEl.renderError(reply);
        return { format, reply, response_ok: false, is_table: false, is_raw: false, is_chart: false, is_image: false, is_error: true };
    }

    if (targetResultEl.isExplainGraph) {
        await targetResultEl.renderGraph();
    } else {
        /// Render totals before coloring, so the totals row (which `_colorTargetRows` includes)
        /// is colored on the first paint, exactly as it would be after a later toggle.
        if (is_table) targetResultEl.renderTotals();
        targetResultEl.applyColumnColors();
        if (is_table) targetResultEl.transposeIfNeeded();
    }

    return { format, reply, response_ok: true, is_table, is_raw, is_chart, is_image, is_error };
}

/// Execute a single query (legacy path, used for single-query mode).
/// When `history_query_text` is provided, it overrides `query` for browser history/URL storage,
/// preserving the full textarea content when running a selected query in multi-query mode.
async function postSingle(posted_request_num, query, history_query_text)
{
    const paramValuesSnapshot = getParamValues();
    last_query_start = performance.now();

    document.getElementById('download-div').style.display = 'none';
    document.getElementById('copy-div').style.display = 'none';

    clear();
    progressEl.start();

    controller = new AbortController();
    const result = await postImpl(posted_request_num, query, resultEl, controller, paramValuesSnapshot);

    if (result.cancelled) return;

    if (result.is_error || !result.response_ok) {
        logoEl.style.display = 'none';
        progressEl.clear();
        document.getElementById('download-div').style.display = 'none';
        document.getElementById('copy-div').style.display = 'none';
        return;
    }

    /// `postImpl` already performed `renderGraph`/`applyColumnColors`/`renderTotals`/`transposeIfNeeded`;
    /// the only step specific to the single-query path is the final table layout pass.
    if (result.is_table) resultEl._changeTableLayout();

    progressEl.finish();
    document.getElementById('download-div').style.display = 'block';
    document.getElementById('copy-div').style.display = result.is_raw ? 'block' : 'none';
    last_query_for_download = query;
    last_params_for_download = paramValuesSnapshot;

    if (result.is_raw || result.is_image) {
        resultEl.elapsedNs = 1e6 * (performance.now() - last_query_start);
        elapsed_ns = resultEl.elapsedNs;
    } else {
        elapsed_ns = resultEl.elapsedNs;
    }

    progressEl.updateText(resultEl.rowCount, resultEl.elapsedNs, resultEl.incompleteResult);
    progressEl.style.setProperty('--progress', '0');
    document.documentElement.style.setProperty('--background-color-rotate', queryToColor(query));

    if (posted_request_num != request_num) { return; }

    /// The query is saved in browser history (in a state JSON object)
    /// as well as in URL fragment identifier.
    /// When history_query_text is provided (multi-query "Run selected" with a single query),
    /// use the full textarea content for history/URL to avoid losing the rest of the editor.
    const saved_query = history_query_text || query;
    if (saved_query != previous_query) {
        const state = {
            query: saved_query,
            format: result.format,
            ok: result.response_ok,
            data: result.reply.length > 100000 ? null : result.reply,
            elapsed_ns: elapsed_ns,
            params: paramValuesSnapshot,
            color_modes: column_color_modes,
        };
        const title = "ClickHouse Query: " + saved_query;

        const user = user_elem.value;
        const server_address = url_elem.value;
        const history_params = [];
        if (user) {
            history_params.push('user=' + encodeURIComponent(user));
        }
        if (run_immediately) {
            history_params.push('run=1');
        }
        if (server_address != location.origin) {
            history_params.push('url=' + encodeURIComponent(server_address));
        }
        for (const [name, value] of Object.entries(paramValuesSnapshot))
        {
            history_params.push('param_' + encodeURIComponent(name) + '=' + encodeURIComponent(value));
        }
        if (Object.keys(column_color_modes).length > 0) {
            history_params.push('color_modes=' + encodeURIComponent(JSON.stringify(column_color_modes)));
        }
        let history_url = window.location.pathname;
        if (history_params.length > 0) {
            history_url += '?' + history_params.join('&');
        }
        history_url += '#' + toBase64(saved_query);

        if (previous_query == '') {
            history.replaceState(state, title, history_url);
        } else {
            history.pushState(state, title, history_url);
        }
        document.title = title;
        previous_query = saved_query;
    }
}

/// Container for dynamically created result elements in multi-query mode.
let multiQueryContainer = null;
/// Array of AbortControllers for all in-flight queries in multi-query mode.
let multiQueryControllers = [];

/// Execute multiple queries with parallelization of consecutive SELECTs.
/// `parsed` is an array of { query, is_select } objects from splitAllQueries.
async function postMulti(posted_request_num, parsed)
{
    const paramValuesSnapshot = getParamValues();
    last_query_start = performance.now();

    document.getElementById('download-div').style.display = 'none';
    document.getElementById('copy-div').style.display = 'none';

    clear();
    progressEl.start();

    /// Hide the default single result element and the logo.
    resultEl.style.display = 'none';
    logoEl.style.display = 'none';

    /// Create a container for multiple results if it doesn't exist.
    if (!multiQueryContainer) {
        multiQueryContainer = document.createElement('div');
        multiQueryContainer.id = 'multi-query-results';
        resultEl.parentElement.insertBefore(multiQueryContainer, resultEl);
    }
    multiQueryContainer.innerHTML = '';
    multiQueryContainer.style.display = 'block';
    multiQueryControllers = [];

    /// Create result elements for each query.
    const resultElements = [];
    for (let i = 0; i < parsed.length; ++i) {
        const el = document.createElement('query-result');
        multiQueryContainer.appendChild(el);
        resultElements.push(el);
    }

    /// Track aggregated progress across all concurrent queries.
    const progressState = new Map(); /// query index -> { read_rows, read_bytes, total_rows, elapsed_ns }
    function updateAggregatedProgress() {
        let total_read_rows = 0, total_read_bytes = 0, total_total_rows = 0, max_elapsed_ns = 0;
        for (const [, p] of progressState) {
            total_read_rows += p.read_rows;
            total_read_bytes += p.read_bytes;
            total_total_rows += p.total_rows;
            max_elapsed_ns = Math.max(max_elapsed_ns, p.elapsed_ns);
        }
        progressEl.updateProgress({
            read_rows: String(total_read_rows),
            read_bytes: String(total_read_bytes),
            total_rows_to_read: String(total_total_rows),
            elapsed_ns: String(max_elapsed_ns),
        });
    }

    /// Listen for progress events from each result element.
    for (let i = 0; i < resultElements.length; ++i) {
        resultElements[i].addEventListener('query-progress', (e) => {
            progressState.set(i, {
                read_rows: +e.detail.read_rows,
                read_bytes: +e.detail.read_bytes,
                total_rows: +e.detail.total_rows_to_read,
                elapsed_ns: +e.detail.elapsed_ns,
            });
            updateAggregatedProgress();
        });
    }

    /// Group consecutive parallelizable queries together.
    /// Each group is either a batch of SELECTs (run in parallel) or a single non-SELECT (barrier).
    const groups = [];
    let current_group = null;
    for (let i = 0; i < parsed.length; ++i) {
        if (parsed[i].is_select) {
            if (!current_group || !current_group.parallelizable) {
                current_group = { parallelizable: true, indices: [] };
                groups.push(current_group);
            }
            current_group.indices.push(i);
        } else {
            current_group = { parallelizable: false, indices: [i] };
            groups.push(current_group);
        }
    }

    /// Execute groups sequentially; within a parallelizable group, execute all queries concurrently.
    let had_error = false;
    for (const group of groups) {
        if (posted_request_num != request_num) return;
        if (had_error) break;

        const promises = group.indices.map(i => {
            const ac = new AbortController();
            multiQueryControllers.push(ac);
            return postImpl(posted_request_num, parsed[i].query, resultElements[i], ac, paramValuesSnapshot)
                .then(result => ({ index: i, result }));
        });

        const results = await Promise.all(promises);

        for (const { index, result } of results) {
            if (result.cancelled) return;
            if (result.is_error || !result.response_ok) {
                had_error = true;
            }
        }
    }

    if (posted_request_num != request_num) return;

    /// Compute aggregated stats.
    let total_rows = 0;
    let max_elapsed_ns = 0;
    let any_incomplete = false;
    for (const el of resultElements) {
        total_rows += el.rowCount;
        max_elapsed_ns = Math.max(max_elapsed_ns, el.elapsedNs);
        if (el.incompleteResult) any_incomplete = true;
    }

    if (!had_error) {
        logoEl.style.display = 'block';
    }

    progressEl.finish();
    elapsed_ns = max_elapsed_ns || 1e6 * (performance.now() - last_query_start);
    progressEl.updateText(total_rows, elapsed_ns, any_incomplete);
    progressEl.style.setProperty('--progress', '0');
    document.documentElement.style.setProperty('--background-color-rotate', queryToColor(parsed[0].query));

    if (posted_request_num != request_num) return;

    /// Save all queries to browser history, using the full textarea content.
    const all_queries_text = query_area.value;
    if (all_queries_text != previous_query) {
        const state = {
            query: all_queries_text,
            format: null,
            ok: !had_error,
            data: null,
            elapsed_ns: elapsed_ns,
            params: paramValuesSnapshot,
            color_modes: column_color_modes,
        };
        const title = "ClickHouse Query: " + parsed[0].query;

        const user = user_elem.value;
        const server_address = url_elem.value;
        const history_params = [];
        if (user) {
            history_params.push('user=' + encodeURIComponent(user));
        }
        if (run_immediately) {
            history_params.push('run=1');
        }
        if (server_address != location.origin) {
            history_params.push('url=' + encodeURIComponent(server_address));
        }
        for (const [name, value] of Object.entries(paramValuesSnapshot))
        {
            history_params.push('param_' + encodeURIComponent(name) + '=' + encodeURIComponent(value));
        }
        if (Object.keys(column_color_modes).length > 0) {
            history_params.push('color_modes=' + encodeURIComponent(JSON.stringify(column_color_modes)));
        }
        let history_url = window.location.pathname;
        if (history_params.length > 0) {
            history_url += '?' + history_params.join('&');
        }
        history_url += '#' + toBase64(all_queries_text);

        if (previous_query == '') {
            history.replaceState(state, title, history_url);
        } else {
            history.pushState(state, title, history_url);
        }
        document.title = title;
        previous_query = all_queries_text;
    }
}

/// Persist the per-column color coding modes into the current history entry and the URL,
/// without creating a new history record, so reloads, shares, and back/forward keep them.
function persistColorModes() {
    const url = new URL(window.location);
    if (Object.keys(column_color_modes).length > 0) {
        url.searchParams.set('color_modes', JSON.stringify(column_color_modes));
    } else {
        url.searchParams.delete('color_modes');
    }
    const state = Object.assign({}, history.state || {}, { color_modes: column_color_modes });
    try {
        history.replaceState(state, document.title, url.toString());
    } catch (e) {
        /// History manipulation is not allowed for the 'file:' protocol.
    }
}

async function restoreFromHistory(state) {
    clear();
    /// Restore the color coding modes saved alongside this history entry before re-rendering.
    column_color_modes = state.color_modes || {};
    query_area.value = state.query;
    query_area.dispatchEvent(new Event('input'));
    resultEl.queryText = state.query;

    /// Restore query parameter inputs and their values.
    await updateQueryParams();
    if (state.params)
    {
        setParamValues(state.params);
    }

    if (!state.data) return;

    let is_table = false;
    let is_raw = false;
    let is_chart = false;
    let is_error = false;

    let format = state.format;

    if (!state.ok) {
        is_error = true;

        let has_exception = false;
        for (const line of state.data.split('\n')) {
            if (line.startsWith(`{"exception":`)) {
                resultEl.update(JSON.parse(line));
                has_exception = true;
                break;
            }
        }
        if (!has_exception) {
            resultEl.renderError(state.data);
            logoEl.style.display = 'none';
        }

        progressEl.clear();
        return;
    } else if (format == default_format) {
        is_table = true;
        let lines = state.data.split('\n');
        let fragment = document.createDocumentFragment();

        for (const line of lines) {
            if (line.length == 0) continue;
            if (!resultEl.update(JSON.parse(line), fragment)) { break; }
        }

        resultEl.flushFragment(fragment);
    } else if (format == 'JSONCompactColumns') {
        is_chart = true;
        if (posted_request_num != request_num) { return; }
        resultEl.renderChart(JSON.parse(state.data));
    } else {
        is_raw = true;
        resultEl.updateRaw(state.data);
    }

    if (resultEl.isExplainGraph) {
        await resultEl.renderGraph();
    } else {
        /// Render totals before coloring, so the totals row is colored on first paint too.
        if (is_table) resultEl.renderTotals();
        resultEl.applyColumnColors();
        if (is_table) resultEl.transposeIfNeeded();
        if (is_table) resultEl._changeTableLayout();
    }

    progressEl.finish();
    document.getElementById('copy-div').style.display = is_raw ? 'block' : 'none';

    if (is_raw) {
        resultEl.elapsedNs = state.elapsed_ns;
    }
    elapsed_ns = resultEl.elapsedNs;

    progressEl.updateText(resultEl.rowCount, resultEl.elapsedNs, resultEl.incompleteResult);
    progressEl.style.setProperty('--progress', '0');
    document.documentElement.style.setProperty('--background-color-rotate', queryToColor(query));
}

let query_area = document.getElementById('query');

appendTextareaResizer();

window.onpopstate = function(event) {
    if (!event.state) return;
    restoreFromHistory(event.state);
};

if (window.location.hash) {
    query_area.value = fromBase64(window.location.hash.substr(1));
    query_area.dispatchEvent(new Event('input'));
}

let in_flight = false;

// Favicon changes to gray while a query is running, to indicate progress on the browser tab.
const favicon_default = document.querySelector('link[rel="icon"]').href;
const favicon_running = 'data:image/svg+xml;base64,' + btoa(atob(favicon_default.split(',')[1]).replace('#ff0', '#bbb'));

function setFavicon(href) { document.querySelector('link[rel="icon"]').href = href; }

function beginFlight() {
    in_flight = true;
    setFavicon(favicon_running);
    document.getElementById('run').innerText = 'Stop';
    document.getElementById('run-all').style.display = 'none';
    /// Hide any open autocompletion when a query starts running.
    closeCompletions();
}

function endFlight() {
    in_flight = false;
    document.getElementById('run').blur();
    updateRunButtons(isMultiQuery);
    setFavicon(favicon_default);
}

/// Run the query under cursor, or all queries intersecting the selection.
async function postOne()
{
    ++request_num;
    document.body.scrollTo(0, 0);
    beginFlight();

    const has_selection = query_area.selectionStart !== query_area.selectionEnd;
    if (has_selection && isMultiQuery) {
        /// Find all queries that intersect the selection and run them.
        const all_text = query_area.value;
        const parsed = await splitAllQueries(all_text);
        const selStart = query_area.selectionStart;
        const selEnd = query_area.selectionEnd;

        /// Use start/end offsets from splitAllQueries to find which queries overlap with the selection.
        const selected = [];
        for (let i = 0; i < parsed.length; ++i) {
            if (parsed[i].end > selStart && parsed[i].start < selEnd) {
                selected.push(parsed[i]);
            }
        }

        if (selected.length > 1) {
            await postMulti(request_num, selected);
        } else if (selected.length === 1) {
            await postSingle(request_num, selected[0].query, all_text);
        }
    } else {
        const query = await getQueryUnderCursor();
        /// In multi-query mode, preserve the full textarea content in history/URL
        /// even when running a single query under cursor (so refresh restores all queries).
        await postSingle(request_num, query, isMultiQuery ? query_area.value : undefined);
    }

    endFlight();
}

/// Run all queries from the textarea.
async function postAll()
{
    ++request_num;
    document.body.scrollTo(0, 0);
    beginFlight();

    const all_text = query_area.value;
    const parsed = await splitAllQueries(all_text);

    if (parsed.length > 1) {
        await postMulti(request_num, parsed);
    } else {
        const query = await getQueryUnderCursor();
        await postSingle(request_num, query);
    }

    endFlight();
}

async function cancel()
{
    /// Invalidate in-flight requests so postImpl/postSingle/postMulti will
    /// see a stale posted_request_num and bail out before saving history.
    ++request_num;
    /// Cancel single-query mode controller.
    if (controller) controller.abort();
    /// Cancel all multi-query mode controllers.
    for (const ac of multiQueryControllers) {
        ac.abort();
    }
    multiQueryControllers = [];
    endFlight();
}

function storeCredentials() {
    if (password_elem.value) {
        const cred = new PasswordCredential({
            id: user_elem.value,
            password: password_elem.value,
            name: url_elem.value,
        });
        navigator.credentials.store(cred);
    }
}

/// The "Run" / "Run one" button submits the form; handle it here.
document.getElementById('controls').addEventListener('submit', e =>
{
    e.preventDefault();
    if (in_flight) {
        cancel();
    } else {
        postOne();
        storeCredentials();
    }
});

/// The "Run all" button.
document.getElementById('run-all').addEventListener('click', e =>
{
    e.preventDefault();
    if (!in_flight) {
        postAll();
        storeCredentials();
    }
});

/// On Mac, the shortcut is Cmd+Enter; elsewhere it is Ctrl+Enter. Show only the relevant modifier in the hint.
/// Match case-insensitively: UA Client Hints reports macOS as "macOS" and iOS as "iOS",
/// while the legacy navigator.platform reports "MacIntel", "iPhone", "iPad", etc.
const isMac = /mac|iphone|ipad|ipod|ios/i.test(navigator.userAgentData?.platform || navigator.platform || '');
document.getElementById('hint-modifier').innerText = isMac ? 'Cmd' : 'Ctrl';

document.addEventListener('keydown', event => {
    /// Firefox has code 13 for Enter and Chromium has code 10.
    if ((event.metaKey || event.ctrlKey) && (event.keyCode == 13 || event.keyCode == 10)) {
        if (in_flight) {
            cancel();
        } else if (event.shiftKey && isMultiQuery) {
            /// Ctrl/Cmd+Shift+Enter runs all queries in multi-query mode.
            postAll();
            storeCredentials();
        } else {
            postOne();
            storeCredentials();
        }
        event.preventDefault();
    }
});

/// Pressing Tab in textarea will increase indentation.
/// But for accessibility reasons, we will fall back to tab navigation if the user already used Tab for that.

let user_prefers_tab_navigation = false;

[...document.querySelectorAll('input')].map(elem => {
    elem.onkeydown = (e) => {
        if (e.key == 'Tab') { user_prefers_tab_navigation = true; }
    };
});

query_area.onkeydown = (e) => {
    if (e.key == 'Tab' && !event.shiftKey && !user_prefers_tab_navigation) {
        document.execCommand('insertText', false, '    ');
        e.preventDefault();
        return false;
    } else if (e.key === 'Enter' && !(event.metaKey || event.ctrlKey)) {
        // If the user presses Enter, and the previous line starts with spaces,
        // then we will insert the same number of spaces.
        const elem = e.target;
        if (elem.selectionStart !== elem.selectionEnd) {
            // If there is a selection, then we will not insert spaces.
            return;
        }
        const cursor_pos = elem.selectionStart;

        const elem_value = elem.value;
        const text_before_cursor = elem_value.substring(0, cursor_pos);
        const text_after_cursor = elem_value.substring(cursor_pos);
        const prev_lines = text_before_cursor.split('\n');
        const prev_line = prev_lines.pop();
        const lead_spaces = prev_line.match(/^\s*/)[0];
        if (!lead_spaces) {
            return;
        }

        // Add leading spaces to the current line.
        elem.value = text_before_cursor + '\n' + lead_spaces + text_after_cursor;
        elem.selectionStart = cursor_pos + lead_spaces.length + 1;
        elem.selectionEnd = elem.selectionStart;
        // Notify listeners (e.g. the syntax-highlighting backdrop) that the textarea
        // value changed — direct assignment to `value` does not fire `input`.
        elem.dispatchEvent(new Event('input', { bubbles: true }));

        e.preventDefault();
        return false;
    } else if ((e.ctrlKey || e.metaKey) && e.key === '/' && !e.shiftKey) {
        // Comment/uncomment selected lines on Ctrl+/ or Cmd+/
        const elem = e.target;
        const start = elem.selectionStart;
        const end = elem.selectionEnd;
        const value = elem.value;

        let lineStart = value.lastIndexOf('\n', start - 1) + 1;
        let lineEnd = value.indexOf('\n', end);
        if (lineEnd === -1) lineEnd = value.length;

        let selectedText = value.substring(lineStart, lineEnd);
        let lines = selectedText.split('\n');

        // Comment out each line, or uncomment if all lines are already commented
        const allCommented = lines.every(line => /^\s*--/.test(line));

        // If all lines are commented out, uncomment them
        if (allCommented) {
            lines = lines.map(line => line.replace(/^(\s*)-- ?/, '$1'));
        } else {
            lines = lines.map(line => {
                if (/^\s*$/.test(line)) {
                    return line;
                }
                return line.replace(/^(\s*)/, '$1-- ');
            });
        }

        const replacedText = lines.join('\n');
        elem.value = value.slice(0, lineStart) + replacedText + value.slice(lineEnd);

        // Adjust selection to keep the user in flow and enable quick reversal
        elem.selectionStart = lineStart;
        elem.selectionEnd = lineStart + replacedText.length;
        // Notify listeners (e.g. the syntax-highlighting backdrop) that the textarea
        // value changed — direct assignment to `value` does not fire `input`.
        elem.dispatchEvent(new Event('input', { bubbles: true }));

        e.preventDefault();
        return false;
    }
};

function clear()
{
    resultEl.clear();
    resultEl.style.display = '';
    progressEl.clear();
    logoEl.style.display = 'block';
    elapsed_ns = 0;

    /// Clean up multi-query results.
    if (multiQueryContainer) {
        multiQueryContainer.innerHTML = '';
        multiQueryContainer.style.display = 'none';
    }
}

function formatReadable(number = 0, decimals = 2, units = []) {
    const k = 1000;
    const i = number ? Math.floor(Math.log(number) / Math.log(k)) : 0;
    const unit = units[i];
    const dm = unit ? decimals : 0;
    return Number(number / Math.pow(k, i)).toFixed(dm) + unit;
}

function formatReadableBytes(bytes) {
    const units = [' B', ' KB', ' MB', ' GB', ' TB', ' PB', ' EB', ' ZB', ' YB'];

    return formatReadable(bytes, 2, units);
}

function formatReadableRows(rows) {
    const units = ['', ' thousand', ' million', ' billion', ' trillion', ' quadrillion'];

    return formatReadable(rows, 2, units);
}

/* Clicking outside data cells deactivates the selected cell */
document.addEventListener('click', e => {
    if (e.target.closest('query-result')) return;
    resultEl.clearSelection();
});


function appendTextareaResizer() {
    const queryDiv = document.getElementById('query_div');
    const textarea = document.getElementById('query');

    let drag_state = {
        elem: null,
        is_dragging: false,
        offset_y: null,
        offset_height: null
    };

    const start = (e) => {
        if (e.button !== 0) { return; }

        drag_state.offset_y = e.clientY;
        drag_state.offset_height = textarea.offsetHeight;
        drag_state.is_dragging = true;
        drag_state.elem = e.target;
        drag_state.elem.classList.add('textarea-resizer-dragging');

        document.addEventListener('pointermove', move);
        document.addEventListener('pointerup', stop);
        document.addEventListener('pointercancel', stop);
    }

    const move = (e) => {
        if (!drag_state.is_dragging) { return; }

        const dy = e.clientY - drag_state.offset_y;
        const newHeight = drag_state.offset_height + dy;

        textarea.style.height = `${newHeight}px`;
    }

    const stop = (e) => {
        drag_state.is_dragging = false;
        drag_state.elem.classList.remove('textarea-resizer-dragging');

        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup', stop);
        document.removeEventListener('pointercancel', stop);
    }

    const resizer = document.createElement('div');
    resizer.className = 'textarea-resizer';
    resizer.addEventListener('pointerdown', start);
    resizer.addEventListener('touchstart', (e) => e.preventDefault());

    queryDiv.appendChild(resizer);
}

function resizeQueryAreaIfSlightlyOverflowing()
{
    const textarea = document.getElementById('query');
    const current_height = textarea.offsetHeight;
    if (!current_height) { return; }

    const style = window.getComputedStyle(textarea);
    const vertical_border = parseFloat(style.borderTopWidth) + parseFloat(style.borderBottomWidth);
    const required_height = textarea.scrollHeight + vertical_border;
    const max_auto_resize_height = current_height * 1.3;

    if (required_height > current_height && required_height <= max_auto_resize_height)
    {
        textarea.style.height = `${required_height}px`;
    }
}

        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }

        lexer_module = await WebAssembly.instantiate(bytes);
    }
}

async function tokenize(query) {
    await loadLexer();

    let exports = lexer_module.instance.exports;
    let buffer = exports.memory.buffer;
    let memory_offset = 0;

    /// Allocate memory for the lexer object
    const lexer = new Uint8Array(buffer, memory_offset, exports.clickhouse_lexer_size);
    memory_offset += exports.clickhouse_lexer_size;

    /// Allocate the query
    const bytes = new TextEncoder().encode(query);
    const query_array = new Uint8Array(buffer, memory_offset, bytes.length);
    query_array.set(bytes);
    const query_begin = memory_offset;
    memory_offset += bytes.length;
    const query_end = memory_offset;

    /// Initialize the lexer
    exports.clickhouse_lexer_create(lexer, query_begin, query_end, 65536);

    /// Allocate the out ptrs
    const token_begin = memory_offset;
    memory_offset += 4;
    const token_end = memory_offset;
    memory_offset += 4;

    let result = [];

    while (true) {
        const token_type = exports.clickhouse_lexer_next_token(lexer, token_begin, token_end);
        if (exports.clickhouse_lexer_token_is_error(token_type) || exports.clickhouse_lexer_token_is_end(token_type)) {
            break;
        }

        const view = new DataView(buffer);
        const begin = view.getUint32(token_begin, true);
        const end = view.getUint32(token_end, true);

        const token_bytes = new Uint8Array(buffer, begin, end - begin);
        let token = new TextDecoder().decode(token_bytes);

        result.push({type: token_type, significant: exports.clickhouse_lexer_token_is_significant(token_type), token: token});
    }

    return result;
}

/// Regression coverage for this function lives in
/// `src/Parsers/tests/gtest_play_get_query_under_cursor.cpp` (a port of the token-walking
/// algorithm on top of the same `DB::Lexer`). Keep the two in sync when changing the logic.
async function getQueryUnderCursor() {
    const all_queries = query_area.value;

    if (typeof WebAssembly !== 'object' || typeof WebAssembly.instantiate !== 'function') {
        return all_queries;
    }

    const tokens = await tokenize(all_queries);
    const should_select_query = getQueryBoundaries(tokens, all_queries).length > 1;

    const cursor_position = query_area.selectionStart;
    let current_query_start = 0;
    let current_offset = 0;
    /// Track the most recently completed non-empty query so that if the cursor
    /// is past the last `;` (with only whitespace/comments after it, or only
    /// further delimiter-only segments like `;;`), we run that query instead
    /// of returning an empty string or a bare delimiter.
    let last_query_start = -1;
    let last_query_end = -1;

    for (const elem of tokens) {
        if (current_query_start == current_offset && !elem.significant) {
            current_query_start += elem.token.length;
        }
        const offset_before_token = current_offset;
        current_offset += elem.token.length;
        if (elem.token == ';') {
            /// If `current_query_start == offset_before_token`, the segment up
            /// to this `;` has no significant content (only whitespace/comments
            /// that the leading-skip above has consumed, or nothing at all).
            /// Treat such a delimiter-only segment as empty: do not run it and
            /// do not record it as the last completed query.
            const has_content = current_query_start < offset_before_token;
            if (has_content && current_offset >= cursor_position) {
                if (should_select_query) query_area.setSelectionRange(current_query_start, current_offset);
                query_area.focus();
                return all_queries.substring(current_query_start, current_offset);
            }
            if (has_content) {
                last_query_start = current_query_start;
                last_query_end = current_offset;
            }
            current_query_start = current_offset;
        }

    }

    /// The cursor is past the last `;`. If the tail has no significant content
    /// (only whitespace/comments, which the leading-skip loop above will have
    /// advanced `current_query_start` past until it equals `current_offset`),
    /// fall back to the query that ended at the last `;` rather than returning
    /// an empty string. This is what handles the "single query ending in `;`
    /// with the cursor placed after it" case.
    if (current_query_start === current_offset && current_offset === all_queries.length && last_query_end >= 0) {
        if (should_select_query) query_area.setSelectionRange(last_query_start, last_query_end);
        query_area.focus();
        return all_queries.substring(last_query_start, last_query_end);
    }

    /// Cursor is in the last query (no trailing semicolon).
    const tail = all_queries.substring(current_query_start);
    if (should_select_query) query_area.setSelectionRange(current_query_start, all_queries.length);
    query_area.focus();
    return tail;
}

const PARALLELIZABLE_KEYWORDS = new Set([
    'SELECT', 'SHOW', 'DESCRIBE', 'DESC', 'EXISTS', 'EXPLAIN', 'WITH'
]);

/// Split the textarea content into individual queries using the lexer.
/// Returns an array of { query, is_select } objects.
/// `is_select` is true for queries that start with a parallelizable keyword
/// (after skipping whitespace, comments, and opening brackets).
async function splitAllQueries(text) {
    if (typeof WebAssembly !== 'object' || typeof WebAssembly.instantiate !== 'function') {
        return [{ query: text, is_select: PARALLELIZABLE_KEYWORDS.has(text.trimStart().split(/\s/)[0].toUpperCase()), start: 0, end: text.length }];
    }

    const tokens = await tokenize(text);
    const queries = [];
    let current_query_start = 0;
    let current_offset = 0;
    let first_keyword = null; /// First significant non-bracket token of the current query.
    let has_significant = false;
    let first_significant_offset = -1;
    let last_significant_end = -1;

    for (const elem of tokens) {
        current_offset += elem.token.length;

        if (elem.token == ';') {
            if (has_significant) {
                const q = text.substring(current_query_start, current_offset).trim();
                if (q && q !== ';') {
                    queries.push({
                        query: q,
                        is_select: first_keyword !== null && PARALLELIZABLE_KEYWORDS.has(first_keyword),
                        start: first_significant_offset,
                        end: last_significant_end,
                    });
                }
            }
            current_query_start = current_offset;
            first_keyword = null;
            has_significant = false;
            first_significant_offset = -1;
            last_significant_end = -1;
        } else if (elem.significant) {
            if (!has_significant) {
                first_significant_offset = current_offset - elem.token.length;
            }
            last_significant_end = current_offset;
            has_significant = true;
            if (first_keyword === null && elem.token !== '(') {
                first_keyword = elem.token.toUpperCase();
            }
        }
    }

    /// Last query (no trailing semicolon)
    if (has_significant) {
        const last = text.substring(current_query_start).trim();
        if (last && last !== ';') {
            queries.push({
                query: last,
                is_select: first_keyword !== null && PARALLELIZABLE_KEYWORDS.has(first_keyword),
                start: first_significant_offset,
                end: last_significant_end,
            });
        }
    }

    return queries;
}

/// Return an array of { start, end } character offsets for each non-empty query.
/// Includes surrounding whitespace/semicolons so spans cover the full text without gaps.
/// Used by updateQueryParams to detect multi-query mode and to highlight query regions.
function getQueryBoundaries(tokens, text) {
    const boundaries = [];
    let current_query_start = 0;
    let current_offset = 0;
    let has_significant = false;

    let first_significant_offset = -1;
    let last_significant_end = -1;

    for (const elem of tokens) {
        current_offset += elem.token.length;
        if (elem.token == ';') {
            if (has_significant) {
                boundaries.push({ start: first_significant_offset, end: last_significant_end });
            }
            current_query_start = current_offset;
            has_significant = false;
            first_significant_offset = -1;
            last_significant_end = -1;
        } else if (elem.significant) {
            if (!has_significant) {
                first_significant_offset = current_offset - elem.token.length;
            }
            last_significant_end = current_offset;
            has_significant = true;
        }
    }

    /// Last query (no trailing semicolon).
    if (has_significant) {
        boundaries.push({ start: first_significant_offset, end: last_significant_end });
    }

    return boundaries;
}

/// Show/hide the "Run all" button and relabel "Run" depending on multi-query mode and selection.
let isMultiQuery = false;

/// Update the backdrop div behind the textarea: paint per-query active backgrounds

function escapeHTML(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/// Numeric TokenType values, matching the order of the C++ enum in src/Parsers/Lexer.h.
/// Only the categories we actually classify are named; everything else is treated as
/// "default" (unstyled) and renders in the canonical text color via the diff blend.
const TT = {

    OpeningRoundBracket: 6, ClosingRoundBracket: 7,
