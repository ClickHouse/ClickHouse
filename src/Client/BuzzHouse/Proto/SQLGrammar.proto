message NumericLiteral {
    required bool negative = 1;
    repeated uint32 digits = 2;
    required bool decimal_point = 3;
    repeated uint32 dec_digits = 4;
    repeated uint32 exp_digits = 5;
    required bool negative_exp = 6;
}

enum Integers {
    UInt8 = 1;
    UInt16 = 2;
    UInt32 = 3;
    UInt64 = 4;
    UInt128 = 5;
    UInt256 = 6;
    Int8 = 7;
