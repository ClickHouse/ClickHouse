          PYTHONUNBUFFERED=1 python3 -m praktika run 'Keeper Stress (No Faults)' --workflow "NightlyKeeperNoFaults" --ci 2>&1 | python3 -u -c 'import sys,datetime
          prefix=lambda: datetime.datetime.now().strftime("[%Y-%m-%d %H:%M:%S]")
          for line in sys.stdin: sys.stdout.write(prefix() + " " + line); sys.stdout.flush()' | tee ./ci/tmp/job.log

  finish_workflow:
    runs-on: [self-hosted, style-checker-aarch64]
    needs: [build_arm_binary, config_workflow, dockers_build_amd, dockers_build_arm, keeper_stress_no_faults]
    if: ${{ always() }}
    name: "Finish Workflow"
    outputs:
      data: ${{ steps.run.outputs.DATA }}
      pipeline_status: ${{ steps.run.outputs.pipeline_status || 'undefined' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Prepare env script
        run: |
          rm -rf ./ci/tmp
          mkdir -p ./ci/tmp
          cat > ./ci/tmp/praktika_setup_env.sh << 'ENV_SETUP_SCRIPT_EOF'
          export PYTHONPATH=./ci:.:

          cat > ./ci/tmp/workflow_job.json << 'EOF'
          ${{ toJson(job) }}
          EOF
          cat > ./ci/tmp/workflow_status.json << 'EOF'
          ${{ toJson(needs) }}
          EOF
          ENV_SETUP_SCRIPT_EOF

      - name: Run
        id: run
        run: |
          . ./ci/tmp/praktika_setup_env.sh
          set -o pipefail
          PYTHONUNBUFFERED=1 python3 -m praktika run 'Finish Workflow' --workflow "NightlyKeeperNoFaults" --ci 2>&1 | python3 -u -c 'import sys,datetime
          prefix=lambda: datetime.datetime.now().strftime("[%Y-%m-%d %H:%M:%S]")
          for line in sys.stdin: sys.stdout.write(prefix() + " " + line); sys.stdout.flush()' | tee ./ci/tmp/job.log
