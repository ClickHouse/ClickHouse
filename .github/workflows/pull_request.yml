          ${{ toJson(job) }}
          EOF
          cat > ./ci/tmp/workflow_status.json << 'EOF'
          ${{ toJson(needs) }}
          EOF
          ENV_SETUP_SCRIPT_EOF

      - name: Run
        id: run
        run: |
          . ./ci/tmp/praktika_setup_env.sh
          PYTHONUNBUFFERED=1 python3 -m praktika run 'Dockers Build (amd)' --workflow "PR" --ci --timestamp

