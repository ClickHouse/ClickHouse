      - name: Run
        id: run
        run: |
          . ./ci/tmp/praktika_setup_env.sh
          PYTHONUNBUFFERED=1 python3 -m praktika run 'SQLancer (amd_debug)' --workflow "NightlySQLancer" --ci --timestamp

  finish_workflow:
    runs-on: [self-hosted, style-checker-aarch64]
    needs: [build_amd_debug, config_workflow, dockers_build_amd, dockers_build_arm, sqlancer_amd_debug]
    if: ${{ always() }}
    name: "Finish Workflow"
    outputs:
      data: ${{ steps.run.outputs.DATA }}
      pipeline_status: ${{ steps.run.outputs.pipeline_status || 'undefined' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
