name: CreateRelease

concurrency:
  group: release

env:
  PYTHONUNBUFFERED: 1

'on':
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git reference (branch or commit sha) from which to create the release'
        required: true
        type: string
      type:
        description: 'The type of release: "new" for a new release or "patch" for a patch release'
        required: true
        type: choice
        options:
          - patch
          - new
      only-repo:
        description: 'Run only repos updates including docker (repo-recovery, tests)'
        required: false
        default: false
        type: boolean
      only-docker:
        description: 'Run only docker builds (repo-recovery, tests)'
        required: false
        default: false
        type: boolean
      dry-run:
        description: 'Dry run'
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      ref:
        description: 'Git reference (branch or commit sha) from which to create the release'
        required: true
        type: string
      type:
        description: 'The type of release: "new" for a new release or "patch" for a patch release'
        required: true
        type: string
      only-repo:
        description: 'Run only repos updates including docker (repo-recovery, tests)'
        required: false
        default: false
        type: boolean
      only-docker:
        description: 'Run only docker builds (repo-recovery, tests)'
        required: false
        default: false
        type: boolean
      dry-run:
        description: 'Dry run'
        required: false
        default: false
        type: boolean
    secrets:
      ROBOT_CLICKHOUSE_COMMIT_TOKEN:

jobs:
  CreateRelease:
    env:
      GH_TOKEN: ${{ secrets.ROBOT_CLICKHOUSE_COMMIT_TOKEN }}
    runs-on: [self-hosted, release-maker]
    outputs:
      release_tag: ${{ steps.export_info.outputs.release_tag }}
      is_latest: ${{ steps.export_info.outputs.is_latest }}
      should_build_docker: ${{ steps.export_info.outputs.should_build_docker }}
    steps:
      - name: Check out repository code
        uses: ClickHouse/checkout@v1
        with:
          token: ${{secrets.ROBOT_CLICKHOUSE_COMMIT_TOKEN}}
          fetch-depth: 0
      - name: Debug Info
        uses: ./.github/actions/debug
      - name: Prepare Release Info
        shell: bash
        run: |
          if [ ${{ inputs.only-repo }} == "true" ] || [ ${{ inputs.only-docker }} == "true" ]; then
              git tag -l ${{ inputs.ref }} || { echo "With only-repo/docker option ref must be a valid release tag"; exit 1; }
          fi
          python3 ./tests/ci/create_release.py --prepare-release-info \
            --ref ${{ inputs.ref }} --release-type ${{ inputs.type }} \
            ${{ inputs.dry-run == true && '--dry-run' || '' }} \
            ${{ (inputs.only-repo == true || inputs.only-docker == true) && '--skip-tag-check' || '' }}
          echo "::group::Release Info"
          python3 -m json.tool /tmp/release_info.json
          echo "::endgroup::"
          release_tag=$(jq -r '.release_tag' /tmp/release_info.json)
          commit_sha=$(jq -r '.commit_sha' /tmp/release_info.json)
          is_latest=$(jq -r '.latest' /tmp/release_info.json)
          echo "Release Tag: $release_tag"
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "COMMIT_SHA=$commit_sha" >> "$GITHUB_ENV"
          if [ "$is_latest" == "true" ]; then
            echo "DOCKER_TAG_TYPE=release-latest" >> "$GITHUB_ENV"
            echo "IS_LATEST=1" >> "$GITHUB_ENV"
          else
            echo "DOCKER_TAG_TYPE=release" >> "$GITHUB_ENV"
            echo "IS_LATEST=0" >> "$GITHUB_ENV"
          fi
      - name: Download All Release Artifacts
        if: ${{ inputs.type == 'patch' && ! inputs.only-docker }}
        shell: bash
        run: |
          python3 ./tests/ci/create_release.py --download-packages ${{ inputs.dry-run == true && '--dry-run' || '' }}
      - name: Push Git Tag for the Release
        if: ${{ ! inputs.only-repo &&  ! inputs.only-docker }}
        shell: bash
        run: |
          python3 ./tests/ci/create_release.py --push-release-tag ${{ inputs.dry-run == true && '--dry-run' || '' }}
      - name: Push New Release Branch
        if: ${{ inputs.type == 'new' && ! inputs.only-repo && ! inputs.only-docker }}
        shell: bash
        run: |
          python3 ./tests/ci/create_release.py --push-new-release-branch ${{ inputs.dry-run == true && '--dry-run' || '' }}
      - name: Bump CH Version and Update Contributors' List
        if: ${{ ! inputs.only-repo && ! inputs.only-docker }}
        shell: bash
        run: |
          python3 ./tests/ci/create_release.py --create-bump-version-pr ${{ inputs.dry-run == true && '--dry-run' || '' }}
      - name: Bump Docker versions, Changelog, Security
        if: ${{ inputs.type == 'patch' && ! inputs.only-repo && ! inputs.only-docker }}
        shell: bash
        run: |
          python3 ./tests/ci/create_release.py --set-progress-started --progress "update changelog, docker version, security"

          # git checkout master  # in case WF started from feature branch
          echo "List versions"
          ./utils/list-versions/list-versions.sh > ./utils/list-versions/version_date.tsv
          echo "Update docker version"
          ./utils/list-versions/update-docker-version.sh
          echo "Generate ChangeLog"
          export CI=1
          docker pull clickhouse/style-test:latest
          docker run -u "${UID}:${GID}" -e PYTHONUNBUFFERED=1 -e CI=1 --network=host \
            --volume=".:/wd" --workdir="/wd" \
            clickhouse/style-test:latest \
            ./tests/ci/changelog.py -v --debug-helpers \
            --gh-user-or-token ${{ secrets.ROBOT_CLICKHOUSE_COMMIT_TOKEN }} \
            --jobs=5 \
            --output="./docs/changelogs/${{ env.RELEASE_TAG }}.md" ${{ env.RELEASE_TAG }}
          git add ./docs/changelogs/${{ env.RELEASE_TAG }}.md
          echo "Generate Security"
          python3 ./utils/security-generator/generate_security.py > SECURITY.md
          git diff HEAD
      - name: Create ChangeLog PR
        if: ${{ inputs.type == 'patch' && ! inputs.dry-run && ! inputs.only-repo && ! inputs.only-docker }}
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          author: "robot-clickhouse <robot-clickhouse@users.noreply.github.com>"
          token: ${{ secrets.ROBOT_CLICKHOUSE_COMMIT_TOKEN }}
          committer: "robot-clickhouse <robot-clickhouse@users.noreply.github.com>"
          commit-message: Update version_date.tsv and changelogs after ${{ env.RELEASE_TAG }}
          branch: auto/${{ env.RELEASE_TAG }}
          base: master
          assignees: ${{ github.event.sender.login }}  # assign the PR to the tag pusher
          delete-branch: true
          title: Update version_date.tsv and changelog after ${{ env.RELEASE_TAG }}
          labels: do not test
          body: |
            Update version_date.tsv and changelogs after ${{ env.RELEASE_TAG }}
            ### Changelog category (leave one):
            - Not for changelog (changelog entry is not required)
      - name: Complete previous steps and Restore git state
        if: ${{ inputs.type == 'patch' && ! inputs.only-repo && ! inputs.only-docker }}
        shell: bash
        run: |
          git reset --hard HEAD
          git checkout "$GITHUB_REF_NAME"
          python3 ./tests/ci/create_release.py --set-progress-completed
      - name: Create GH Release
        if: ${{ inputs.type == 'patch' && ! inputs.only-repo && ! inputs.only-docker}}
        shell: bash
        run: |
          python3 ./tests/ci/create_release.py --create-gh-release ${{ inputs.dry-run == true && '--dry-run' || '' }}
      - name: Export TGZ Packages
        if: ${{ inputs.type == 'patch' && ! inputs.only-docker }}
        shell: bash
        run: |
          python3 ./tests/ci/artifactory.py --export-tgz ${{ inputs.dry-run == true && '--dry-run' || '' }}
      - name: Test TGZ Packages
        if: ${{ inputs.type == 'patch' && ! inputs.only-docker }}
        shell: bash
        run: |
          python3 ./tests/ci/artifactory.py --test-tgz ${{ inputs.dry-run == true && '--dry-run' || '' }}
      - name: Export RPM Packages
        if: ${{ inputs.type == 'patch' && ! inputs.only-docker }}
        shell: bash
        run: |
          python3 ./tests/ci/artifactory.py --export-rpm ${{ inputs.dry-run == true && '--dry-run' || '' }}
      - name: Test RPM Packages
        if: ${{ inputs.type == 'patch' && ! inputs.only-docker }}
        shell: bash
        run: |
          python3 ./tests/ci/artifactory.py --test-rpm ${{ inputs.dry-run == true && '--dry-run' || '' }}
      - name: Export Debian Packages
        if: ${{ inputs.type == 'patch' && ! inputs.only-docker }}
        shell: bash
        run: |
          python3 ./tests/ci/artifactory.py --export-debian ${{ inputs.dry-run == true && '--dry-run' || '' }}
      - name: Test Debian Packages
        if: ${{ inputs.type == 'patch' && ! inputs.only-docker }}
        shell: bash
        run: |
          python3 ./tests/ci/artifactory.py --test-debian ${{ inputs.dry-run == true && '--dry-run' || '' }}
      - name: Export release info for downstream jobs
        id: export_info
        shell: bash
        run: |
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "is_latest=${IS_LATEST}" >> "$GITHUB_OUTPUT"
          if [ "${{ inputs.type }}" == "patch" ] && [ "${{ inputs.dry-run }}" != "true" ]; then
            echo "should_build_docker=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build_docker=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload release info
        uses: actions/upload-artifact@v4
        with:
          name: release-info
          path: /tmp/release_info.json

  DockerBuild:
    needs: CreateRelease
    if: ${{ needs.CreateRelease.outputs.should_build_docker == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: '["self-hosted", "release-maker"]'
            arch: amd64
          - platform: linux/arm64
            runner: '["self-hosted", "style-checker-aarch64"]'
            arch: arm64
    runs-on: ${{ fromJSON(matrix.runner) }}
    env:
      GH_TOKEN: ${{ secrets.ROBOT_CLICKHOUSE_COMMIT_TOKEN }}
    steps:
      - name: Check out repository code
        uses: ClickHouse/checkout@v1
        with:
          token: ${{ secrets.ROBOT_CLICKHOUSE_COMMIT_TOKEN }}
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Prepare version info
        id: version
        env:
          RELEASE_TAG: ${{ needs.CreateRelease.outputs.release_tag }}
        shell: bash
        run: |
          git checkout "$RELEASE_TAG"
          cd tests/ci
          python3 ./version_helper.py --export > /tmp/version.sh
          . /tmp/version.sh
          if [[ ! $CLICKHOUSE_VERSION_STRING =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version string: $CLICKHOUSE_VERSION_STRING"
            exit 1
          fi
          echo "version=$CLICKHOUSE_VERSION_STRING" >> "$GITHUB_OUTPUT"
      - name: Build and push clickhouse-server images
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          DOCKER_IMAGE="clickhouse/clickhouse-server"
          configs=(
            "ubuntu:docker/server/Dockerfile.ubuntu"
            "alpine:docker/server/Dockerfile.alpine"
            "distroless:docker/server/Dockerfile.distroless"
          )
          for config in "${configs[@]}"; do
            variant=${config%%:*}
            dockerfile=${config##*:}
            if [ ! -f "$dockerfile" ]; then
              echo "Skipping $variant: $dockerfile not found at this tag"
              continue
            fi
            VERSION_SUFFIX=$([ "$variant" = "ubuntu" ] && echo "" || echo "-$variant")
            TEMP_TAG="${DOCKER_IMAGE}:${VERSION}${VERSION_SUFFIX}-${{ matrix.arch }}"
            echo "Building $variant for ${{ matrix.platform }} -> $TEMP_TAG"
            docker buildx build \
              --platform=${{ matrix.platform }} \
              --provenance=true \
              --sbom=true \
              --output=type=registry \
              --label=com.clickhouse.build.version="${VERSION}${VERSION_SUFFIX}" \
              --tag="$TEMP_TAG" \
              --build-arg=VERSION="$VERSION" \
              --progress=plain \
              --file="$dockerfile" \
              docker/server
          done
      - name: Build and push clickhouse-keeper images
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          DOCKER_IMAGE="clickhouse/clickhouse-keeper"
          configs=(
            "ubuntu:docker/keeper/Dockerfile.ubuntu"
            "alpine:docker/keeper/Dockerfile.alpine"
            "distroless:docker/keeper/Dockerfile.distroless"
          )
          for config in "${configs[@]}"; do
            variant=${config%%:*}
            dockerfile=${config##*:}
            if [ ! -f "$dockerfile" ]; then
              echo "Skipping $variant: $dockerfile not found at this tag"
              continue
            fi
            VERSION_SUFFIX=$([ "$variant" = "ubuntu" ] && echo "" || echo "-$variant")
            TEMP_TAG="${DOCKER_IMAGE}:${VERSION}${VERSION_SUFFIX}-${{ matrix.arch }}"
            echo "Building $variant for ${{ matrix.platform }} -> $TEMP_TAG"
            docker buildx build \
              --platform=${{ matrix.platform }} \
              --provenance=true \
              --sbom=true \
              --output=type=registry \
              --label=com.clickhouse.build.version="${VERSION}${VERSION_SUFFIX}" \
              --tag="$TEMP_TAG" \
              --build-arg=VERSION="$VERSION" \
              --progress=plain \
              --file="$dockerfile" \
              docker/keeper
          done

  DockerManifest:
    needs: [CreateRelease, DockerBuild]
    runs-on: [self-hosted, release-maker]
    env:
      GH_TOKEN: ${{ secrets.ROBOT_CLICKHOUSE_COMMIT_TOKEN }}
    steps:
      - name: Check out repository code
        uses: ClickHouse/checkout@v1
        with:
          token: ${{ secrets.ROBOT_CLICKHOUSE_COMMIT_TOKEN }}
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Prepare version info
        id: version
        env:
          RELEASE_TAG: ${{ needs.CreateRelease.outputs.release_tag }}
        shell: bash
        run: |
          git checkout "$RELEASE_TAG"
          cd tests/ci
          python3 ./version_helper.py --export > /tmp/version.sh
          . /tmp/version.sh
          CLICKHOUSE_VERSION_MINOR="${CLICKHOUSE_VERSION_STRING%.*}"
          CLICKHOUSE_VERSION_MAJOR="${CLICKHOUSE_VERSION_MINOR%.*}"
          echo "version=$CLICKHOUSE_VERSION_STRING" >> "$GITHUB_OUTPUT"
          echo "version_minor=$CLICKHOUSE_VERSION_MINOR" >> "$GITHUB_OUTPUT"
          echo "version_major=$CLICKHOUSE_VERSION_MAJOR" >> "$GITHUB_OUTPUT"
      - name: Create multi-arch manifests for clickhouse-server
        env:
          IS_LATEST: ${{ needs.CreateRelease.outputs.is_latest }}
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_MINOR: ${{ steps.version.outputs.version_minor }}
          VERSION_MAJOR: ${{ steps.version.outputs.version_major }}
        shell: bash
        run: |
          DOCKER_IMAGE="clickhouse/clickhouse-server"
          for variant in ubuntu alpine distroless; do
            VERSION_SUFFIX=$([ "$variant" = "ubuntu" ] && echo "" || echo "-$variant")
            SRC_AMD64="${DOCKER_IMAGE}:${VERSION}${VERSION_SUFFIX}-amd64"
            SRC_ARM64="${DOCKER_IMAGE}:${VERSION}${VERSION_SUFFIX}-arm64"

            # Skip if platform images were not built (e.g., Dockerfile missing at this tag)
            if ! docker buildx imagetools inspect "$SRC_AMD64" > /dev/null 2>&1; then
              echo "Skipping $variant manifest: $SRC_AMD64 not found"
              continue
            fi
            if ! docker buildx imagetools inspect "$SRC_ARM64" > /dev/null 2>&1; then
              echo "Skipping $variant manifest: $SRC_ARM64 not found"
              continue
            fi

            TAGS=(
              "--tag" "${DOCKER_IMAGE}:${VERSION}${VERSION_SUFFIX}"
              "--tag" "${DOCKER_IMAGE}:${VERSION_MINOR}${VERSION_SUFFIX}"
              "--tag" "${DOCKER_IMAGE}:${VERSION_MAJOR}${VERSION_SUFFIX}"
            )
            if [ "$IS_LATEST" = "1" ]; then
              TAGS+=("--tag" "${DOCKER_IMAGE}:latest${VERSION_SUFFIX}")
            fi

            echo "Creating manifest for $variant: ${TAGS[*]}"
            docker buildx imagetools create \
              "${TAGS[@]}" \
              "$SRC_AMD64" \
              "$SRC_ARM64"
          done
      - name: Create multi-arch manifests for clickhouse-keeper
        env:
          IS_LATEST: ${{ needs.CreateRelease.outputs.is_latest }}
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_MINOR: ${{ steps.version.outputs.version_minor }}
          VERSION_MAJOR: ${{ steps.version.outputs.version_major }}
        shell: bash
        run: |
          DOCKER_IMAGE="clickhouse/clickhouse-keeper"
          for variant in ubuntu alpine distroless; do
            VERSION_SUFFIX=$([ "$variant" = "ubuntu" ] && echo "" || echo "-$variant")
            SRC_AMD64="${DOCKER_IMAGE}:${VERSION}${VERSION_SUFFIX}-amd64"
            SRC_ARM64="${DOCKER_IMAGE}:${VERSION}${VERSION_SUFFIX}-arm64"

            if ! docker buildx imagetools inspect "$SRC_AMD64" > /dev/null 2>&1; then
              echo "Skipping $variant manifest: $SRC_AMD64 not found"
              continue
            fi
            if ! docker buildx imagetools inspect "$SRC_ARM64" > /dev/null 2>&1; then
              echo "Skipping $variant manifest: $SRC_ARM64 not found"
              continue
            fi

            TAGS=(
              "--tag" "${DOCKER_IMAGE}:${VERSION}${VERSION_SUFFIX}"
              "--tag" "${DOCKER_IMAGE}:${VERSION_MINOR}${VERSION_SUFFIX}"
              "--tag" "${DOCKER_IMAGE}:${VERSION_MAJOR}${VERSION_SUFFIX}"
            )
            if [ "$IS_LATEST" = "1" ]; then
              TAGS+=("--tag" "${DOCKER_IMAGE}:latest${VERSION_SUFFIX}")
            fi

            echo "Creating manifest for $variant: ${TAGS[*]}"
            docker buildx imagetools create \
              "${TAGS[@]}" \
              "$SRC_AMD64" \
              "$SRC_ARM64"
          done

  Finalize:
    needs: [CreateRelease, DockerManifest]
    if: ${{ !cancelled() }}
    runs-on: [self-hosted, release-maker]
    env:
      GH_TOKEN: ${{ secrets.ROBOT_CLICKHOUSE_COMMIT_TOKEN }}
    steps:
      - name: Check out repository code
        uses: ClickHouse/checkout@v1
        with:
          token: ${{ secrets.ROBOT_CLICKHOUSE_COMMIT_TOKEN }}
          fetch-depth: 0
      - name: Download release info
        uses: actions/download-artifact@v4
        with:
          name: release-info
          path: /tmp/
      - name: Checkout back
        shell: bash
        run: |
          git checkout ${{ github.ref }}
      - name: Update release info. Merge created PRs
        shell: bash
        run: |
          python3 ./tests/ci/create_release.py --merge-prs ${{ inputs.dry-run == true && '--dry-run' || '' }}
      - name: Set current Release progress to Completed with OK
        shell: bash
        run: |
          # dummy stage to finalize release info with "progress: completed; status: OK"
          python3 ./tests/ci/create_release.py --set-progress-started --progress "completed"
          python3 ./tests/ci/create_release.py --set-progress-completed
      - name: Post Slack Message
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          python3 ./tests/ci/create_release.py --post-status ${{ inputs.dry-run == true && '--dry-run' || '' }}
