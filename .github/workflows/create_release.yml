# generated by praktika

name: CreateRelease
on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git reference (branch or commit SHA) from which to create the release
        required: true
        default: ''
      type:
        description: The type of release: "new" for a new release or "patch" for a patch release
        type: choice
        options: ['patch', 'new']
        default: patch
      only-repo:
        description: Run only repo updates including docker (repo-recovery, tests)
        required: false
        default: false
      only-docker:
        description: Run only docker builds (repo-recovery, tests)
        required: false
        default: false
      dry-run:
        description: Dry run — show what would be done without making changes
        required: false
        default: false
      assignee:
        description: GitHub login to assign the changelog PR to (defaults to the workflow triggerer)
        required: false
        default: ''

env:
  PYTHONUNBUFFERED: 1
  CHECKOUT_REF: ""
  ROBOT_CLICKHOUSE_COMMIT_TOKEN: ${{ secrets.ROBOT_CLICKHOUSE_COMMIT_TOKEN }}

# Allow updating GH commit statuses and PR comments to post an actual job reports link
permissions: write-all

jobs:

  createrelease:
    runs-on: [self-hosted, release-maker-asg]
    needs: []
    name: "CreateRelease"
    outputs:
      data: ${{ steps.run.outputs.DATA }}
      pipeline_status: ${{ steps.run.outputs.pipeline_status || 'undefined' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Prepare env script
        run: |
          rm -rf ./ci/tmp
          mkdir -p ./ci/tmp
          cat > ./ci/tmp/praktika_setup_env.sh << 'ENV_SETUP_SCRIPT_EOF'
          export PYTHONPATH=./ci:.:
          export ROBOT_CLICKHOUSE_COMMIT_TOKEN=$(cat<<'EOF'
          ${{ secrets.ROBOT_CLICKHOUSE_COMMIT_TOKEN }}
          EOF
          )
          cat > ./ci/tmp/workflow_inputs.json << 'EOF'
          ${{ toJson(github.event.inputs) }}
          EOF
          cat > ./ci/tmp/workflow_job.json << 'EOF'
          ${{ toJson(job) }}
          EOF
          cat > ./ci/tmp/workflow_status.json << 'EOF'
          ${{ toJson(needs) }}
          EOF
          ENV_SETUP_SCRIPT_EOF

      - name: Run
        id: run
        run: |
          . ./ci/tmp/praktika_setup_env.sh
          set -o pipefail
          PYTHONUNBUFFERED=1 python3 -m praktika run 'CreateRelease' --workflow "CreateRelease" --ci 2>&1 | python3 -u -c 'import sys,datetime
          prefix=lambda: datetime.datetime.now().strftime("[%Y-%m-%d %H:%M:%S]")
          for line in sys.stdin: sys.stdout.write(prefix() + " " + line); sys.stdout.flush()' | tee ./ci/tmp/job.log
