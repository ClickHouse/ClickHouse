[package]
name = "_ch_rust_rustyline"
version = "0.1.0"
edition = "2021"

[dependencies]
# Pinned to a version whose `nix` dependency (0.29) is already vendored.
# When bumping, re-run rust/vendor.sh.
rustyline = { version = "15.0.0", default-features = false, features = [
    "custom-bindings",
    "with-file-history",
] }
# Bundled here (rather than a sibling workspace member) so that the cxx
# bridge runtime is compiled exactly once for the line-editor stack —
# splitting skim into its own staticlib produced duplicate-symbol errors
# at the final dbms link.
skim = { version = "0.20.2", default-features = false, features = ["cli"] }
term = "1.0.0"
clap = "4.5.22"
cxx = "1.0.83"
libc = "0.2"

[build-dependencies]
cxx-build = "1.0.83"

[lib]
crate-type = ["staticlib"]
